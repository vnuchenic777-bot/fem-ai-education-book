evidence_model:
  mandatory_rule: компетенция считается освоенной только при принятии артефакта и успешном прохождении
    теста или практической проверки
  artifact_definition: 'продукт деятельности слушателя, который можно проверить по критериям: документ,
    видео, библиотека запросов, фрагмент занятия, аналитический материал, чек-лист, комплект заданий или
    итоговый проект'
  test_definition: 'формальная проверка знаний и навыков: автоматический тест, сценарная проверка, практический
    тест, защита проекта'
  human_confirmation: для официального ДПО итоговые, открытые и спорные результаты подтверждаются преподавателем
    или проверяющим; ИИ может использоваться только как помощник проверки
  minimum_passing_level: 2
  levels:
  - level: 0
    code: not_formed
    name: не сформирована
    meaning: слушатель не представил достаточного доказательства освоения; артефакт отсутствует, не связан
      с задачей или тест не пройден
  - level: 1
    code: initial
    name: начальный уровень
    meaning: слушатель воспроизводит отдельные элементы действия, но результат требует существенной доработки
      и не может быть применен в дисциплине без сопровождения
  - level: 2
    code: sufficient
    name: достаточный уровень
    meaning: слушатель выполняет профессиональное действие по критериям; результат можно использовать
      после обычной редакторской или методической правки
  - level: 3
    code: confident
    name: уверенный уровень
    meaning: слушатель выполняет действие самостоятельно, адаптирует его под дисциплину, объясняет логику
      решений и может передать подход студентам или коллегам
integration_requirements:
  with_rpm:
  - компетенции должны быть включены в раздел планируемых результатов обучения
  - модули РПМ должны иметь явную связь с компетенциями
  - итоговая аттестация должна подтверждать ПК-ИИ-10 и интегрировать остальные компетенции
  with_fos:
  - для каждой компетенции должен быть создан минимум один артефакт и один тест/проверка
  - критерии матрицы должны стать основой рубрик ФОС
  - типичные ошибки должны быть использованы как основания для доработки работ слушателей
  with_final_project:
  - итоговый проект должен подтверждать ПК-ИИ-10 и интегрировать доказательства ПК-ИИ-1 — ПК-ИИ-9
  - каждая часть итогового проекта должна быть связана минимум с одной компетенцией
  with_certificate:
  - в документе об обучении допускается отражение перечня освоенных компетенций
  - юридический статус сертификата или удостоверения требует отдельного согласования
  - при частичном освоении должна быть возможность фиксировать неосвоенные компетенции для последующей
    доработки
  with_platform:
  - компетенции должны быть связаны с CourseTemplate, CourseModule, AssessmentItem, GradeScheme, AssignmentSubmission
    и IssuedCertificate
  - все артефакты должны быть загружаемыми или фиксируемыми в платформе
  - тесты и проверки должны быть совместимы с автоматической, ручной или ИИ-помощной проверкой с подтверждением
    человеком
competencies:
- code: ПК-ИИ-1
  name: Концептуальная грамотность об ИИ
  formulation: Преподаватель объясняет принципы работы нейронных сетей, больших языковых моделей и многомодального
    ИИ на прикладном уровне, без мистификации и без упрощений, и связывает это объяснение с задачами собственной
    дисциплины.
  formation_modules:
  - M1
  - M2
  - M3
  role_in_course: вводная и опорная компетенция; обеспечивает общее понимание, необходимое для последующей
    постановки запросов, проверки ответов и методического проектирования
  must_know:
  - 'что такое нейронная сеть на прикладном уровне: входы, параметры, обучение, ошибка и корректировка'
  - почему современные языковые модели формируют вероятностный ответ, а не извлекают гарантированно истинное
    знание
  - что такое генеративная модель, контекст, ограничение контекста и многомодальный ввод
  - почему возникают галлюцинации и почему уверенный стиль ответа не является доказательством достоверности
  - какие задачи преподавателя ИИ может поддерживать, а какие решения остаются ответственностью человека
  must_be_able_to:
  - объяснить коллегам или студентам принцип работы ИИ без технического жаргона и без ложных аналогий
  - привести пример применения ИИ в собственной дисциплине
  - обозначить ограничения результата ИИ и необходимость проверки
  - отличить корректное учебное объяснение от рекламного или пугающего описания ИИ
  professional_actions:
  - готовит краткое объяснение ИИ для аудитории преподавателей или студентов
  - адаптирует техническое понятие к языку своей дисциплины
  - показывает, где ИИ может помочь, а где не может заменить профессиональное решение преподавателя
  artifact:
    title: Пояснительный материал «Что такое ИИ в контексте моей дисциплины»
    format: текст 1-1,5 страницы или видео 3-5 минут
    required_structure:
    - краткое объяснение принципа работы ИИ
    - пример из собственной дисциплины
    - одно ограничение применения
    - одно правило проверки результата
    - вывод о роли преподавателя
    submission_files:
    - pdf/docx/markdown
    - по решению курса - ссылка на видео или загруженный видеофайл
    minimum_requirements: материал понятен преподавателю без технической подготовки и не содержит фактических
      и методических искажений
  test_or_check:
    type: концептуальный тест с автоматической проверкой и короткими ответами
    volume: 15-20 вопросов
    question_types:
    - один правильный ответ
    - несколько правильных ответов
    - короткий текстовый ответ
    - сценарный вопрос
    checks:
    - перцептрон и принцип обучения
    - отличие классической и генеративной модели
    - причины ошибок
    - границы применимости ИИ
    passing_rule: не менее 70 процентов правильных ответов; короткие ответы проверяются по эталонным смысловым
      элементам
  assessment_criteria:
  - понятность объяснения для не технической аудитории
  - корректность основных понятий
  - связь с дисциплиной слушателя
  - наличие указания на ограничения и проверку результата
  - отсутствие мистификации, пугающих образов и некорректных утверждений
  levels:
    '0': 'объяснение отсутствует или содержит грубые ошибки: ИИ описан как сознательный субъект или как
      безошибочная база знаний'
    '1': объяснение фрагментарно; отдельные понятия названы, но связи с дисциплиной и ограничениями нет
    '2': объяснение корректно, связано с дисциплиной, содержит пример и указание на ограничения
    '3': объяснение методически выстроено, может быть использовано в занятии или публичном выступлении,
      содержит ясную позицию преподавателя
  typical_errors:
  - описание ИИ как самостоятельного субъекта мышления
  - сведение ИИ к поисковой системе или базе знаний
  - замена объяснения эмоциональными утверждениями о пользе или опасности
  - отсутствие примера из собственной дисциплины
  risks:
  - при слабом освоении компетенции слушатель не сможет объяснять студентам требования к работе с ИИ
  - ошибочное понимание природы ИИ приведет к некритичному доверию или необоснованному отказу от инструмента
  final_project_connection: используется при подготовке словаря терминологии ИИ применительно к дисциплине
    и вводного пояснения к заданиям с обязательным использованием ИИ
- code: ПК-ИИ-2
  name: Постановка запросов как профессиональный навык
  formulation: Преподаватель формулирует профессиональные запросы к ИИ-инструментам с учетом цели, роли,
    контекста, исходных данных, ограничений, критериев качества и требуемого формата результата; способен
    улучшать запрос через последовательные итерации.
  formation_modules:
  - M4
  - M5
  - M6
  - M7
  - M8
  role_in_course: операционная компетенция, управляющая качеством почти всех практических результатов
    курса
  must_know:
  - структурные элементы качественного запроса
  - типовые причины некачественного ответа ИИ
  - роль контекста, ограничений и формата результата
  - значение итераций и уточнений
  - разницу между запросом на черновик, анализ, проверку, преобразование и критику результата
  must_be_able_to:
  - превращать общую задачу в структурированный запрос
  - задавать критерии качества результата
  - уточнять запрос после анализа первого ответа
  - создавать повторно применимые шаблоны запросов под регулярные преподавательские задачи
  - обосновывать, почему выбранная структура запроса соответствует задаче
  professional_actions:
  - разрабатывает запросы для учебных, методических, научных, аналитических и административных задач
  - ведет журнал итераций запроса
  - выделяет элементы запроса, которые влияют на качество результата
  artifact:
    title: Личная библиотека профессиональных запросов преподавателя
    format: таблица или структурированный документ
    required_structure:
    - 10-15 запросов для регулярных задач
    - 'не менее 3 подробных примеров: слабый запрос - первая версия результата - уточнение - улучшенный
      результат'
    - 'для каждого запроса: цель, контекст, ограничения, критерии качества, формат результата, способ
      проверки'
    submission_files:
    - markdown
    - xlsx
    - csv
    - json/yaml по выбору платформы
    minimum_requirements: каждый запрос должен быть связан с реальной профессиональной задачей слушателя
      и содержать критерии проверки результата
  test_or_check:
    type: практический тест с проверкой по рубрике
    volume: 5 задач
    question_types:
    - составление запроса
    - улучшение слабого запроса
    - выбор ограничений
    - обоснование структуры
    checks:
    - полнота структуры запроса
    - соответствие задаче
    - проверяемость результата
    - наличие итерации
    passing_rule: не менее 4 из 5 запросов должны получить уровень не ниже достаточного по рубрике
  assessment_criteria:
  - цель запроса сформулирована как конкретная профессиональная задача
  - задан контекст и исходные условия
  - указаны ограничения и нежелательные действия модели
  - описан формат результата
  - заданы критерии качества и способ проверки
  - показана хотя бы одна содержательная итерация улучшения
  levels:
    '0': запрос отсутствует или является общей просьбой без контекста и критериев
    '1': запрос содержит цель, но не содержит ограничений, критериев или формата результата
    '2': запрос структурирован, связан с задачей, содержит критерии и дает проверяемый результат
    '3': запрос адаптирован под дисциплину, содержит итерации, альтернативы и может быть включен в библиотеку
      преподавателя
  typical_errors:
  - один универсальный запрос для разных задач
  - отсутствие критериев качества
  - смешение нескольких задач в одном запросе
  - ожидание итогового документа без этапа уточнения и проверки
  risks:
  - без этой компетенции слушатель будет получать скомканные результаты и ошибочно считать ИИ бесполезным
  - слабые запросы приведут к слабым учебным материалам, заданиям и итоговому проекту
  final_project_connection: все задания итогового проекта должны сопровождаться примерами запросов и логикой
    их итеративного улучшения
- code: ПК-ИИ-3
  name: Критическая проверка ответов ИИ
  formulation: Преподаватель выявляет проверяемые утверждения в ответах ИИ, отличает факты от предположений,
    проверяет достоверность, исправляет ошибки и объясняет студентам процедуру критической проверки результата.
  formation_modules:
  - M3
  - M6
  - M8
  role_in_course: контрольная компетенция, обеспечивающая качество и безопасность применения ИИ во всех
    профессиональных действиях
  must_know:
  - что такое галлюцинация в ответе ИИ
  - 'какие типы утверждений требуют обязательной проверки: факты, числа, даты, фамилии, источники, нормативные
    утверждения'
  - разницу между стилистическим качеством текста и фактической достоверностью
  - ограничения ИИ при ссылках на источники и документы
  - способы документирования проверки
  must_be_able_to:
  - выделять проверяемые утверждения в тексте
  - подбирать способ проверки утверждения
  - классифицировать результат как подтвержденный, ошибочный, недоказанный или требующий уточнения
  - исправлять ошибочные фрагменты
  - объяснять студенту логику проверки
  professional_actions:
  - размечает ответ ИИ по проверяемым утверждениям
  - проводит ручную проверку существенных фактов
  - составляет методический комментарий о надежности результата
  artifact:
    title: Разбор сгенерированного ответа ИИ
    format: таблица проверки и методический комментарий
    required_structure:
    - исходный запрос и ответ ИИ
    - не менее 5 проверяемых утверждений
    - способ проверки каждого утверждения
    - статус проверки
    - исправленная формулировка
    - комментарий о том, как объяснить эту процедуру студентам
    submission_files:
    - markdown
    - docx/pdf
    - xlsx/csv
