  - разработать 2-3 задания с обязательным использованием ИИ
  - подготовить план практического или лабораторного занятия
  - сформулировать предложения по обновлению РПМ
  - разработать критерии оценивания студенческих работ
  - описать риски и меры их снижения
  - защитить логику проекта в видео-презентации
  professional_actions:
  - собирает результаты всех модулей в единый проект
  - адаптирует ИИ-инструменты под собственную дисциплину
  - проектирует учебные действия студентов
  - формирует предложения для методического обсуждения на кафедре или факультете
  artifact:
    title: Итоговый проект интеграции ИИ в дисциплину или РПМ
    format: пакет документов и асинхронная защита
    required_structure:
    - 'словарь терминологии ИИ применительно к дисциплине: 10-20 терминов'
    - 2-3 задания с обязательным использованием ИИ студентами
    - план одного лабораторного или практического занятия
    - предложение по обновлению 1-2 разделов РПМ
    - критерии оценивания студенческих работ
    - описание рисков и способов их снижения
    - рефлексия преподавателя о дальнейшем развитии дисциплины
    submission_files:
    - основной документ проекта
    - таблица заданий и критериев
    - видео-презентация 10-15 минут
    - ответы на вопросы преподавателя курса
    minimum_requirements: проект должен быть связан с реальной дисциплиной слушателя и иметь признаки
      готовности к методическому обсуждению
  test_or_check:
    type: защита итогового проекта
    volume: видео 10-15 минут + 3-5 вопросов преподавателя курса
    question_types:
    - обоснование методического решения
    - защита критериев
    - объяснение рисков
    - уточнение внедрения в РПМ
    checks:
    - целостность проекта
    - связь с дисциплиной
    - качество заданий
    - готовность критериев
    - учет рисков
    - рефлексия
    passing_rule: проект принят, если все обязательные части представлены и минимум 2 из 3 ключевых заданий
      с обязательным использованием ИИ соответствуют критериям
  assessment_criteria:
  - проект связан с реальной дисциплиной
  - терминология ИИ адаптирована к предметной области
  - задания требуют осмысленного применения ИИ студентами
  - план занятия реализуем
  - предложения по РПМ конкретны
  - критерии оценивания проверяемы
  - риски и меры снижения описаны содержательно
  - слушатель способен защитить логику проекта
  levels:
    '0': проект отсутствует или является набором общих рассуждений без дисциплины
    '1': проект содержит отдельные элементы, но не образует целостной модели внедрения
    '2': проект применим в дисциплине и содержит все обязательные части
    '3': проект готов к пилотному внедрению и может быть представлен на методическом обсуждении
  typical_errors:
  - отсутствие связи с конкретной дисциплиной
  - задания без обязательного процесса работы с ИИ
  - критерии оценивания не проверяют вклад студента
  - предложение по РПМ слишком общее
  - риски названы формально и не связаны с мерами снижения
  risks:
  - внедрение ИИ останется декларативным
  - РПМ будет обновлена формально, без изменения учебной деятельности
  - студенты будут использовать ИИ без проверки и понимания дисциплины
  final_project_connection: компетенция полностью подтверждается итоговым проектом и является основанием
    для признания курса освоенным на интеграционном уровне
