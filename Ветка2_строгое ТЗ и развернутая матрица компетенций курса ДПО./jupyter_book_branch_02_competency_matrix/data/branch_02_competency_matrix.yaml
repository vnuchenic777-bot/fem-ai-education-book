  formation_modules:
  - M8
  - M4
  - M5
  - M6
  - M7
  role_in_course: ограничительная и защитная компетенция, обеспечивающая безопасное применение всех остальных
    компетенций
  must_know:
  - какие категории данных требуют особой осторожности
  - почему нельзя переносить персональные и конфиденциальные сведения во внешние сервисы без оценки допустимости
  - что юридические требования и локальные акты должны проверяться по официальным источникам
  - как связаны ИИ, авторство и академическая добросовестность
  - какие ситуации требуют консультации с ответственными лицами организации
  must_be_able_to:
  - оценить допустимость применения ИИ к конкретной задаче
  - составить чек-лист безопасного применения ИИ
  - обезличить или исключить чувствительные сведения
  - описать ограничения для студентов
  - разобрать спорную ситуацию и предложить безопасное решение
  professional_actions:
  - проводит предварительную оценку риска перед применением ИИ
  - создает чек-лист безопасного применения
  - описывает правила для студенческих заданий
  - фиксирует открытые вопросы, требующие проверки по локальным документам
  artifact:
    title: Чек-лист безопасного применения ИИ и анализ типовых ситуаций
    format: чек-лист + 3-5 разборов ситуаций
    required_structure:
    - перечень вопросов перед применением ИИ
    - категории данных и материалов
    - 'решение: можно / нельзя / можно при условиях / требуется согласование'
    - обоснование решения
    - меры снижения риска
    - что требует проверки по официальным источникам или локальным актам
    submission_files:
    - markdown/docx/pdf
    - таблица чек-листа
    minimum_requirements: решения должны быть конкретными и применимыми к преподавательской практике,
      без выдуманных нормативных ссылок
  test_or_check:
    type: сценарный тест
    volume: 10-15 ситуаций
    question_types:
    - выбор допустимого действия
    - обоснование
    - классификация риска
    - выбор меры снижения риска
    checks:
    - персональные данные
    - конфиденциальность
    - авторство
    - академическая добросовестность
    - локальные требования
    passing_rule: не менее 75 процентов правильных решений; критические ошибки в сценариях персональных
      данных требуют обязательной доработки
  assessment_criteria:
  - слушатель различает виды рисков
  - решение привязано к конкретной ситуации
  - не выдуманы нормативные требования
  - указано, что требует официальной или локальной проверки
  - предложены меры снижения риска
  - чек-лист можно применять в реальной работе
  levels:
    '0': риски игнорируются или заменяются общей фразой о необходимости быть осторожным
    '1': риски перечислены, но не связаны с действиями преподавателя и решениями
    '2': чек-лист и анализ ситуаций позволяют принимать безопасные решения
    '3': слушатель способен встроить правила безопасного применения ИИ в задания, РПМ и инструкции для
