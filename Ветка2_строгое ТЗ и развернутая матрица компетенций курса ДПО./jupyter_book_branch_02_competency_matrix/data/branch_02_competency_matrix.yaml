implementation_plan:
- step: 1
  title: Проверка исходной базы
  result: подтверждено, что используется утвержденный список ПК-ИИ-1 — ПК-ИИ-10
- step: 2
  title: Раскрытие каждой компетенции
  result: для каждой компетенции заполнены все обязательные поля
- step: 3
  title: Разработка критериев и уровней
  result: для каждой компетенции есть уровни 0-3 и минимальный уровень зачета
- step: 4
  title: Проверка доказательств освоения
  result: каждая компетенция имеет артефакт и тест/проверку
- step: 5
  title: Согласование связей
  result: матрица связана с РПМ, ФОС, итоговым проектом, сертификатом и платформой
- step: 6
  title: Подготовка итоговых файлов
  result: готовы YAML, JSON, JSON Schema и Markdown
acceptance_criteria:
- в документе присутствуют все 10 компетенций ПК-ИИ-1 — ПК-ИИ-10
- для каждой компетенции заполнены все required_matrix_fields
- каждая компетенция связана минимум с одним модулем курса
- каждая компетенция имеет артефакт
- каждая компетенция имеет тест или практическую проверку
- для каждой компетенции указаны проверяемые критерии освоения
- для каждой компетенции указаны уровни сформированности 0-3
- для каждой компетенции указаны типичные ошибки и риски
- для каждой компетенции указана связь с итоговым проектом
- матрица не содержит выдуманных нормативных ссылок
- матрица может быть использована как основание для РПМ и ФОС
- структура пригодна для загрузки в инженерные и ИИ-среды без потери вложенных таблиц
ready_prompt_for_ai_or_engineer: Разработай и проверь матрицу компетенций курса ДПО по структуре этого
  YAML. Не меняй список компетенций и модулей. Для каждой компетенции заполни все обязательные поля. Каждая
  компетенция должна иметь проверяемое профессиональное действие, артефакт, тест или практическую проверку,
  критерии, уровни 0-3, типичные ошибки, риски и связь с итоговым проектом. Не добавляй юридические утверждения
  без проверки. Итог должен быть пригоден для РПМ, ФОС, итогового проекта, сертификата и образовательной
  платформы.
