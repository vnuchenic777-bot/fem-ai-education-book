  formation_modules:
  - M8
  role_in_course: интеграционная мета-компетенция, объединяющая результаты всех предыдущих компетенций
  must_know:
  - как связать ИИ с результатами обучения дисциплины
  - как включать задания с обязательным использованием ИИ в образовательную логику дисциплины
  - как формулировать критерии оценивания таких заданий
