document:
  id: DPO_AI_BRANCH_02_COMPETENCY_MATRIX_TZ
  title: Техническое задание на разработку матрицы компетенций курса ДПО
  branch: '[ДПО ИИ] 02 — Матрица компетенций'
  version: '1.0'
  status: ready_for_methodical_development
  language: ru-RU
  recommended_primary_format: YAML
  format_policy: 'YAML является каноническим форматом: он сохраняет вложенные структуры, таблицы, критерии,
    уровни и связи без потери данных при загрузке в инженерные и ИИ-среды. JSON используется для машинной
    обработки и валидации. Markdown используется только как человекочитаемая проекция.'
course:
  title: 'ИИ-инструменты в преподавательской, научной и повседневной работе: от понимания принципов до
    практического применения'
  program_type: программа повышения квалификации в системе ДПО
  hours_total: 72
  target_audience: преподаватели с разным уровнем цифровой подготовки
  core_goal: сформировать у преподавателей проверяемые профессиональные компетенции применения ИИ в учебной,
    методической, научной, организационной и повседневной работе, а также подготовить их к проектированию
    заданий с обязательным использованием ИИ студентами и обновлению РПМ
  modules:
  - id: M1
    number: 1
    title: 'Введение: зачем преподавателю ИИ'
    hours: 6
  - id: M2
    number: 2
    title: Как устроены нейронные сети на понятном уровне
    hours: 8
  - id: M3
    number: 3
    title: Большие языковые модели и генеративный ИИ
    hours: 8
  - id: M4
    number: 4
    title: Постановка запросов как профессиональный навык
    hours: 10
  - id: M5
    number: 5
    title: ИИ в учебной и методической работе
    hours: 10
  - id: M6
    number: 6
    title: ИИ в научной и аналитической работе
    hours: 8
  - id: M7
    number: 7
    title: Документы, коммуникация и повседневная профессиональная рутина
    hours: 8
  - id: M8
    number: 8
    title: Риски, этика, безопасность и итоговый проект
    hours: 14
source_documents:
- file: COURSE_DPO_AI_72H.md
  purpose: утвержденная структура курса, 10 компетенций, 8 модулей, артефакт + тест
- file: ASSESSMENT_CERTIFICATION.md
  purpose: форматы оценивания, двухчастное доказательство компетенции, сертификат
- file: FACULTY_AI_STRATEGY.md
  purpose: стратегия обязательной интеграции ИИ в РПМ и задания студентов
- file: DATA_MODEL.md
  purpose: связь компетенций с шаблоном курса, запуском курса, оцениванием и сертификатом
- file: MVP_SPEC.md
  purpose: сценарии прохождения курса, задания, проверки, прогресс, итоговый статус
- file: LEGAL_PRIVACY.md
  purpose: персональные данные, согласия, ограничения правовых формулировок
task_statement:
  role: методист ДПО и специалист по проектированию компетентностных моделей
  objective: разработать полную матрицу компетенций ПК-ИИ-1 — ПК-ИИ-10, пригодную для включения в РПМ,
    ФОС, итоговый проект, сертификат и структуру образовательной платформы
  principles:
  - каждая компетенция должна быть проверяемой через конкретное профессиональное действие слушателя
  - 'каждая компетенция подтверждается двумя элементами: артефакт + тест или практическая проверка'
  - формулировки не должны быть общими или рекламными
  - компетенции должны быть связаны с модулями курса, итоговым проектом и будущим обновлением РПМ
  - юридические требования не выдумываются; спорные правовые положения отмечаются как требующие проверки
    по официальным источникам и локальным актам
  non_goals:
  - не разрабатывать полный ФОС в этой ветке, только требования и связи для него
  - не писать тексты лекций
  - не утверждать юридический статус сертификата
  - не разрабатывать интерфейсы платформы
  - не менять утвержденную структуру 8 модулей и 72 часов
