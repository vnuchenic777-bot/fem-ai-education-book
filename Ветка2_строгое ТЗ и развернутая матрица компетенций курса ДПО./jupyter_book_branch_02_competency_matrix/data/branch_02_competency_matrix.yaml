  - нарушение режима персональных или служебных данных
  - появление юридически или организационно неточных документов
  - формальное улучшение стиля без улучшения смысла
  final_project_connection: используется при подготовке предложения по обновлению РПМ, инструкций для
    студентов и организационных материалов к дисциплине
- code: ПК-ИИ-8
  name: Многомодальный ИИ для создания визуальных, аудио-, видео- и презентационных материалов
  formulation: Преподаватель применяет многомодальные ИИ-инструменты для создания и редактирования учебных
    изображений, инфографики, презентаций, аудио- и видеофрагментов, сохраняя связь материала с образовательной
    целью и проверяя качество результата.
  formation_modules:
  - M3
  - M5
  - M7
  role_in_course: сквозная компетенция визуального и мультимедийного сопровождения обучения, не выделенная
    в отдельный модуль, чтобы сохранить восьмимодульную структуру курса
  must_know:
  - различие между текстовыми, визуальными, аудио- и видеоинструментами
  - 'типы задач: генерация, редактирование, преобразование, раскадровка, презентационная сборка'
  - ограничения качества и проверяемости визуального результата
  - риски нарушения авторских прав и недостоверного визуального представления
  - принцип подчинения визуального материала учебной цели
  must_be_able_to:
  - сформулировать запрос для визуального или презентационного материала
  - создать учебную инфографику, изображение или презентационный фрагмент
  - подготовить аудио- или видеофрагмент при наличии образовательной задачи
  - оценить читаемость, точность и уместность результата
  - связать мультимодальный материал с занятием или заданием
  professional_actions:
  - создает набор учебных мультимодальных материалов
  - фиксирует запросы и итерации
  - редактирует результат под учебную цель
  - описывает ограничения использования материала
  artifact:
    title: Комплект мультимодальных учебных материалов
    format: минимум 3 продукта разных типов
    required_structure:
    - изображение или инфографика
    - презентационный материал
    - аудио- или видеофрагмент либо сценарий такого фрагмента, если техническое создание ограничено
    - 'для каждого продукта: учебная цель, запросы, итерации, правки, проверка качества'
    submission_files:
    - изображение/png/jpeg/pdf
    - презентация/pdf/pptx
    - аудио/видео или сценарий
    - журнал запросов
    minimum_requirements: каждый материал должен иметь учебную функцию и не подменять содержание внешним
      эффектом
  test_or_check:
    type: тест на различение задач и практическая проверка материалов
    volume: 8-10 вопросов + комплект материалов
    question_types:
    - выбор инструмента
    - выбор типа генерации
    - оценка качества
    - выявление риска
    checks:
    - соответствие учебной цели
    - читаемость
    - достоверность
    - правовые ограничения
    - качество запроса
    passing_rule: комплект принят по рубрике; тест - не менее 70 процентов
  assessment_criteria:
  - материал связан с конкретной учебной задачей
  - визуальный или мультимедийный результат читаем и понятен
  - журнал запросов и итераций представлен
  - содержание не искажено ради внешнего эффекта
  - риски авторских прав и недостоверного изображения учтены
  levels:
    '0': материалы отсутствуют или являются декоративными, не связанными с учебной целью
    '1': материалы созданы, но имеют слабую связь с темой или недостаточное качество
    '2': комплект материалов пригоден для занятия, содержит журнал запросов и проверку качества
    '3': материалы образуют методически целостное визуальное сопровождение занятия или задания
  typical_errors:
  - создание красивого визуала без учебной задачи
  - нечитабельная инфографика
  - отсутствие проверки смысла изображения
  - использование спорных материалов без оценки правовых ограничений
  - отсутствие пояснения, как материал используется на занятии
  risks:
  - содержание занятия может быть подменено внешней выразительностью
  - визуальный материал может содержать фактические ошибки или вводящие в заблуждение элементы
  - могут возникнуть вопросы авторских прав и допустимости использования изображений
  final_project_connection: мультимодальные материалы включаются в план занятия, презентацию итогового
    проекта или комплект материалов для студенческого задания
- code: ПК-ИИ-9
  name: Безопасность, этика и правовые границы применения ИИ
  formulation: Преподаватель определяет допустимые и недопустимые сценарии применения ИИ с учетом персональных
    данных, конфиденциальной информации, авторства, академической добросовестности, локальных правил образовательной
