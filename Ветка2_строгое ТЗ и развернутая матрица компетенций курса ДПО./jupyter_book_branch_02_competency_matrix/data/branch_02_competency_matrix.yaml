  typical_errors:
  - формальное упоминание этики без конкретных действий
  - загрузка данных студентов во внешние инструменты без оценки допустимости
  - выдумывание ссылок на нормативные акты
  - игнорирование авторства и прозрачности использования ИИ
  - отсутствие правил для студентов
  risks:
  - нарушение правил обработки персональных данных или локальных требований организации
  - академические споры из-за непрозрачного применения ИИ
  - использование недостоверных или недопустимых материалов в обучении
  final_project_connection: в итоговый проект включается раздел рисков и мер снижения, а также правила
    безопасного использования ИИ студентами
- code: ПК-ИИ-10
  name: ИИ-лидерство в собственной дисциплине
  formulation: 'Преподаватель проектирует целостную модель интеграции ИИ в собственную дисциплину: формирует
    терминологию, задания с обязательным использованием ИИ, план занятия, критерии оценивания, предложения
