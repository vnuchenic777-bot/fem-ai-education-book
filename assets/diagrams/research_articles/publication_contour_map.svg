</defs><text x="60" y="58" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">Карта публикационного контура проекта</text><text x="60" y="92" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Схема показывает, как проектные материалы, Jupyter Book, серия статей и публичная публикация на GitHub Pages образуют единый исследовательско-методический</tspan><tspan x="60" dy="23">контур.</tspan></text><rect x="72" y="142" width="252" height="46" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.6"/><text x="198" y="172" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Проектная работа</text><rect x="373" y="142" width="252" height="46" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/><text x="499" y="172" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Исходные материалы</text><rect x="674" y="142" width="252" height="46" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/><text x="800" y="172" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Jupyter Book</text><rect x="975" y="142" width="252" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/><text x="1101" y="172" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Серия статей</text><rect x="1276" y="142" width="252" height="46" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/><text x="1402" y="172" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Публичный доступ</text><rect x="72" y="218" width="252" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.7"/><text x="198.0" y="249" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">Платформа</tspan></text><text x="198.0" y="277" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">роли, доступ, данные, PWA</tspan></text><rect x="72" y="330" width="252" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.7"/><text x="198.0" y="361" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">Курс ДПО</tspan></text><text x="198.0" y="389" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">72 часа, 8 модулей, ПК-ИИ-1</tspan><tspan x="198.0" dy="19">— ПК-ИИ-10</tspan></text><rect x="72" y="442" width="252" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.7"/><text x="198.0" y="473" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">Оценивание</tspan></text><text x="198.0" y="501" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">артефакты, тесты, итоговый</tspan><tspan x="198.0" dy="19">проект</tspan></text><rect x="72" y="554" width="252" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.7"/><text x="198.0" y="585" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">Документ результата</tspan></text><text x="198.0" y="613" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="198.0" dy="0">статус, PDF, QR, аудит</tspan></text><rect x="373" y="218" width="252" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.7"/><text x="499.0" y="249" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">Markdown</tspan></text><text x="499.0" y="277" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">главы, README, редакционные</tspan><tspan x="499.0" dy="19">версии</tspan></text><rect x="373" y="330" width="252" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.7"/><text x="499.0" y="361" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">YAML / JSON</tspan></text><text x="499.0" y="389" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">структуры курса,</tspan><tspan x="499.0" dy="19">спецификации, данные</tspan></text><rect x="373" y="442" width="252" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.7"/><text x="499.0" y="473" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">Notebooks</tspan></text><text x="499.0" y="501" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">таблицы, графики,</tspan><tspan x="499.0" dy="19">проверяемые расчёты</tspan></text><rect x="373" y="554" width="252" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.7"/><text x="499.0" y="585" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">Assets</tspan></text><text x="499.0" y="613" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="499.0" dy="0">изображения, диаграммы,</tspan><tspan x="499.0" dy="19">схемы</tspan></text><rect x="674" y="218" width="252" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.7"/><text x="800.0" y="249" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">_config.yml</tspan></text><text x="800.0" y="277" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">параметры сборки и</tspan><tspan x="800.0" dy="19">репозитория</tspan></text><rect x="674" y="330" width="252" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.7"/><text x="800.0" y="361" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">_toc.yml</tspan></text><text x="800.0" y="389" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">структура книги и порядок</tspan><tspan x="800.0" dy="19">глав</tspan></text><rect x="674" y="442" width="252" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.7"/><text x="800.0" y="473" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">book/</tspan></text><text x="800.0" y="501" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">публичные главы и notebooks</tspan></text><rect x="674" y="554" width="252" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.7"/><text x="800.0" y="585" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">bibliography.bib</tspan></text><text x="800.0" y="613" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="800.0" dy="0">единая база источников</tspan></text><rect x="975" y="274" width="252" height="88" rx="8" fill="#f7fbff" stroke="#93c5fd" stroke-width="1.7"/><text x="1101.0" y="305" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1101.0" dy="0">Статья 01</tspan></text><text x="1101.0" y="333" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1101.0" dy="0">концепция платформы и</tspan><tspan x="1101.0" dy="19">экосистемы</tspan></text><rect x="975" y="386" width="252" height="88" rx="8" fill="#f7fbff" stroke="#93c5fd" stroke-width="1.7"/><text x="1101.0" y="417" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1101.0" dy="0">Статья 02</tspan></text><text x="1101.0" y="445" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1101.0" dy="0">методология ДПО по ИИ-</tspan><tspan x="1101.0" dy="19">инструментам</tspan></text><rect x="975" y="498" width="252" height="88" rx="8" fill="#f7fbff" stroke="#93c5fd" stroke-width="1.7"/><text x="1101.0" y="529" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1101.0" dy="0">Статья 03</tspan></text><text x="1101.0" y="557" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1101.0" dy="0">цифровой документ результата</tspan><tspan x="1101.0" dy="19">обучения</tspan></text><rect x="1276" y="274" width="252" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.7"/><text x="1402.0" y="305" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1402.0" dy="0">GitHub Pages</tspan></text><text x="1402.0" y="333" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1402.0" dy="0">автоматически собранный HTML</tspan></text><rect x="1276" y="386" width="252" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.7"/><text x="1402.0" y="417" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1402.0" dy="0">Читатель</tspan></text><text x="1402.0" y="445" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1402.0" dy="0">переходит от статьи к данным</tspan><tspan x="1402.0" dy="19">и главам</tspan></text><rect x="1276" y="498" width="252" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.7"/><text x="1402.0" y="529" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1402.0" dy="0">Рецензент</tspan></text><text x="1402.0" y="557" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1402.0" dy="0">видит источники и</tspan><tspan x="1402.0" dy="19">воспроизводимость</tspan></text><text x="800" y="685" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="700" fill="#334155" text-anchor="middle">основной поток подготовки публичной книги</text><line x1="324" y1="708" x2="373" y2="708" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="625" y1="708" x2="674" y2="708" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="926" y1="708" x2="975" y2="708" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="1227" y1="708" x2="1276" y2="708" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="1402" y1="752" x2="198" y2="752" stroke="#0f766e" stroke-width="2.0" stroke-linecap="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><text x="800" y="779" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#0f766e" text-anchor="middle">обратная связь: уточнение статей, данных, визуализаций и открытых вопросов</text><rect x="72" y="818" width="1456" height="108" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.6"/><text x="104" y="853" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#9f1239" text-anchor="start">Граница открытой публикации</text><text x="104" y="883" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="400" fill="#4c0519" text-anchor="start"><tspan x="104" dy="0">В публичный контур не выносятся ключи доступа, персональные данные и закрытые материалы организации. Юридические утверждения публикуются только после отдельного</tspan><tspan x="104" dy="22">согласования.</tspan></text><text x="1528" y="945" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="end">Источник: проектная структура репозитория Jupyter Book, 2026</text></svg>
