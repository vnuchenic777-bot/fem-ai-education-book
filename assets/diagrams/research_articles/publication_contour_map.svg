</defs><text x="60" y="58" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">Карта публикационного контура проекта</text><text x="60" y="92" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Схема показывает, как проектные материалы, Jupyter Book, серия статей и публичная публикация на GitHub Pages образуют единый исследовательско-методический</tspan><tspan x="60" dy="23">контур.</tspan></text><rect x="60" y="145" width="220" height="46" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.6"/><text x="170" y="175" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Проектная работа</text><rect x="390" y="145" width="220" height="46" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/><text x="500" y="175" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Исходные материалы</text><rect x="720" y="145" width="220" height="46" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/><text x="830" y="175" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Jupyter Book</text><rect x="1040" y="145" width="220" height="46" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.6"/><text x="1150" y="175" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Серия статей</text><rect x="1340" y="145" width="220" height="46" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.6"/><text x="1450" y="175" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#111827" text-anchor="middle">Публичный доступ</text><rect x="40" y="225" width="260" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.8"/><text x="58" y="256" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="58" dy="0">Платформа</tspan></text><text x="58" y="286" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="58" dy="0">роли, доступ, данные, PWA</tspan></text><rect x="40" y="341" width="260" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.8"/><text x="58" y="372" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="58" dy="0">Курс ДПО</tspan></text><text x="58" y="402" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="58" dy="0">72 часа, 8 модулей, ПК-ИИ-1 —</tspan><tspan x="58" dy="20">ПК-ИИ-10</tspan></text><rect x="40" y="457" width="260" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.8"/><text x="58" y="488" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="58" dy="0">Оценивание</tspan></text><text x="58" y="518" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="58" dy="0">артефакты, тесты, итоговый</tspan><tspan x="58" dy="20">проект</tspan></text><rect x="40" y="573" width="260" height="88" rx="8" fill="#f8fdff" stroke="#67e8f9" stroke-width="1.8"/><text x="58" y="604" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="58" dy="0">Документ результата</tspan></text><text x="58" y="634" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="58" dy="0">статус, PDF, QR, аудит</tspan></text><rect x="370" y="225" width="260" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.8"/><text x="388" y="256" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="388" dy="0">Markdown</tspan></text><text x="388" y="286" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="388" dy="0">главы, README, редакционные</tspan><tspan x="388" dy="20">версии</tspan></text><rect x="370" y="341" width="260" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.8"/><text x="388" y="372" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="388" dy="0">YAML / JSON</tspan></text><text x="388" y="402" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="388" dy="0">структуры курса,</tspan><tspan x="388" dy="20">спецификации, данные</tspan></text><rect x="370" y="457" width="260" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.8"/><text x="388" y="488" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="388" dy="0">Notebooks</tspan></text><text x="388" y="518" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="388" dy="0">таблицы, графики, проверяемые</tspan><tspan x="388" dy="20">расчёты</tspan></text><rect x="370" y="573" width="260" height="88" rx="8" fill="#fbfffb" stroke="#86efac" stroke-width="1.8"/><text x="388" y="604" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="388" dy="0">Assets</tspan></text><text x="388" y="634" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="388" dy="0">изображения, диаграммы, схемы</tspan></text><rect x="700" y="225" width="260" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.8"/><text x="718" y="256" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="718" dy="0">_config.yml</tspan></text><text x="718" y="286" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="718" dy="0">параметры сборки и</tspan><tspan x="718" dy="20">репозитория</tspan></text><rect x="700" y="341" width="260" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.8"/><text x="718" y="372" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="718" dy="0">_toc.yml</tspan></text><text x="718" y="402" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="718" dy="0">структура книги и порядок</tspan><tspan x="718" dy="20">глав</tspan></text><rect x="700" y="457" width="260" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.8"/><text x="718" y="488" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="718" dy="0">book/</tspan></text><text x="718" y="518" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="718" dy="0">публичные главы и notebooks</tspan></text><rect x="700" y="573" width="260" height="88" rx="8" fill="#fffaf2" stroke="#fdba74" stroke-width="1.8"/><text x="718" y="604" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="718" dy="0">bibliography.bib</tspan></text><text x="718" y="634" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="718" dy="0">единая база источников</tspan></text><rect x="1025" y="250" width="260" height="88" rx="8" fill="#f7fbff" stroke="#93c5fd" stroke-width="1.8"/><text x="1043" y="281" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1043" dy="0">Статья 01</tspan></text><text x="1043" y="311" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1043" dy="0">концепция платформы и</tspan><tspan x="1043" dy="20">экосистемы</tspan></text><rect x="1025" y="366" width="260" height="88" rx="8" fill="#f7fbff" stroke="#93c5fd" stroke-width="1.8"/><text x="1043" y="397" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1043" dy="0">Статья 02</tspan></text><text x="1043" y="427" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1043" dy="0">методология ДПО по ИИ-</tspan><tspan x="1043" dy="20">инструментам</tspan></text><rect x="1025" y="482" width="260" height="88" rx="8" fill="#f7fbff" stroke="#93c5fd" stroke-width="1.8"/><text x="1043" y="513" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1043" dy="0">Статья 03</tspan></text><text x="1043" y="543" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1043" dy="0">цифровой документ результата</tspan><tspan x="1043" dy="20">обучения</tspan></text><rect x="1320" y="270" width="260" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.8"/><text x="1338" y="301" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1338" dy="0">GitHub Pages</tspan></text><text x="1338" y="331" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1338" dy="0">автоматически собранный HTML</tspan></text><rect x="1320" y="386" width="260" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.8"/><text x="1338" y="417" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1338" dy="0">Читатель</tspan></text><text x="1338" y="447" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1338" dy="0">переходит от статьи к данным</tspan><tspan x="1338" dy="20">и главам</tspan></text><rect x="1320" y="502" width="260" height="88" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.8"/><text x="1338" y="533" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1338" dy="0">Рецензент</tspan></text><text x="1338" y="563" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1338" dy="0">видит источники и</tspan><tspan x="1338" dy="20">воспроизводимость</tspan></text><line x1="315" y1="460" x2="360" y2="460" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="645" y1="460" x2="690" y2="460" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="975" y1="460" x2="1020" y2="460" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="1280" y1="460" x2="1325" y2="460" stroke="#475569" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/><path d="M1155 608 C1110 760, 520 780, 170 672" fill="none" stroke="#0f766e" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><text x="650" y="805" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#0f766e" text-anchor="middle">обратная связь: уточнение статей, данных, визуализаций и открытых вопросов</text><rect x="60" y="855" width="1480" height="82" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.6"/><text x="84" y="887" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#9f1239" text-anchor="start">Граница открытой публикации</text><text x="84" y="916" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="400" fill="#4c0519" text-anchor="start"><tspan x="84" dy="0">В публичный контур не выносятся ключи доступа, персональные данные, закрытые материалы организации и юридические утверждения, не прошедшие отдельное</tspan><tspan x="84" dy="22">согласование.</tspan></text><text x="1540" y="958" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="end">Источник: проектная структура репозитория Jupyter Book, 2026</text></svg>
