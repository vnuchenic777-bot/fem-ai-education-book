</defs><text x="60" y="58" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">Публичная доменная модель данных платформы</text><text x="60" y="92" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Схема показывает только научно-публикуемый уровень доменной модели: сущности и связи, необходимые для курса ДПО, оценивания, цифрового следа и документа</tspan><tspan x="60" dy="23">результата обучения.</tspan></text><rect x="70" y="180" width="250" height="118" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.8"/><text x="195.0" y="216" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="195.0" dy="0">Access Control</tspan></text><text x="195.0" y="252" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="195.0" dy="0">User, Role, Permission</tspan></text><rect x="385" y="180" width="270" height="118" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8"/><text x="520.0" y="216" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="520.0" dy="0">Learning</tspan></text><text x="520.0" y="252" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="520.0" dy="0">CourseTemplate, Module,</tspan><tspan x="520.0" dy="19">Lesson, Resource</tspan></text><rect x="720" y="180" width="250" height="118" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="845.0" y="216" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="845.0" dy="0">CourseRun</tspan></text><text x="845.0" y="252" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="845.0" dy="0">конкретный запуск программы</tspan></text><rect x="1035" y="180" width="250" height="118" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="1160.0" y="216" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1160.0" dy="0">Enrollment</tspan></text><text x="1160.0" y="252" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1160.0" dy="0">слушатель, доступ, прогресс</tspan></text><rect x="385" y="420" width="270" height="118" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/><text x="520.0" y="456" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="520.0" dy="0">Assessment</tspan></text><text x="520.0" y="492" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="520.0" dy="0">AssessmentItem, Submission,</tspan><tspan x="520.0" dy="19">Grade, Rubric</tspan></text><rect x="720" y="420" width="250" height="118" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/><text x="845.0" y="456" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="845.0" dy="0">Competency</tspan></text><text x="845.0" y="492" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="845.0" dy="0">CompetencyEvidence,</tspan><tspan x="845.0" dy="19">CompetencyResult</tspan></text><rect x="1035" y="420" width="250" height="118" rx="8" fill="#fff1f2" stroke="#dc2626" stroke-width="1.8"/><text x="1160.0" y="456" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1160.0" dy="0">Certification</tspan></text><text x="1160.0" y="492" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1160.0" dy="0">CertificateTemplate,</tspan><tspan x="1160.0" dy="19">IssuedCertificate</tspan></text><rect x="720" y="660" width="250" height="118" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.8"/><text x="845.0" y="696" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="845.0" dy="0">Storage</tspan></text><text x="845.0" y="732" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="845.0" dy="0">StorageObject, FileHash,</tspan><tspan x="845.0" dy="19">AssetReference</tspan></text><rect x="1035" y="660" width="250" height="118" rx="8" fill="#f8fafc" stroke="#64748b" stroke-width="1.8"/><text x="1160.0" y="696" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="middle"><tspan x="1160.0" dy="0">Audit</tspan></text><text x="1160.0" y="732" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="middle"><tspan x="1160.0" dy="0">AuditLog, AuditEventType,</tspan><tspan x="1160.0" dy="19">ActorRef</tspan></text><line x1="320.0" y1="239.0" x2="385.0" y2="239.0" stroke="#334155" stroke-width="2.0" stroke-linecap="round" marker-end="url(#arrow)"/><text x="352.5" y="227.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">права на курс</text><line x1="655.0" y1="239.0" x2="720.0" y2="239.0" stroke="#334155" stroke-width="2.0" stroke-linecap="round" marker-end="url(#arrow)"/><text x="687.5" y="227.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">публикация запуска</text><line x1="970.0" y1="239.0" x2="1035.0" y2="239.0" stroke="#334155" stroke-width="2.0" stroke-linecap="round" marker-end="url(#arrow)"/><text x="1002.5" y="227.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">зачисление</text><path d="M520.0 298.0 C520.0 339.0, 520.0 339.0, 520.0 420.0" fill="none" stroke="#334155" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="520.0" y="329.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">задания и рубрики</text><line x1="655.0" y1="479.0" x2="720.0" y2="479.0" stroke="#334155" stroke-width="2.0" stroke-linecap="round" marker-end="url(#arrow)"/><text x="687.5" y="467.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">доказательства</text><line x1="970.0" y1="479.0" x2="1035.0" y2="479.0" stroke="#334155" stroke-width="2.0" stroke-linecap="round" marker-end="url(#arrow)"/><text x="1002.5" y="467.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">основание документа</text><path d="M1160.0 538.0 C1160.0 599.0, 845.0 599.0, 845.0 660.0" fill="none" stroke="#334155" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><text x="1002.5" y="589.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">PDF и файлы</text><path d="M1160.0 538.0 C1160.0 599.0, 1160.0 599.0, 1160.0 660.0" fill="none" stroke="#334155" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><text x="1160.0" y="589.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">выдача, отзыв, проверка</text><path d="M1160.0 298.0 C1160.0 394.0, 1160.0 394.0, 1160.0 420.0" fill="none" stroke="#334155" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><text x="1160.0" y="384.0" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle">итоговый статус</text><rect x="70" y="850" width="1215" height="86" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.6"/><text x="100" y="884" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#9f1239" text-anchor="start">Публичная граница модели данных</text><text x="100" y="914" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#4c0519" text-anchor="start"><tspan x="100" dy="0">Диаграмма не раскрывает production-схему, персональные данные, ключи, внутренние URL, логи и инфраструктурные настройки. Она фиксирует только</tspan><tspan x="100" dy="21">домены, связи и смысл цифрового следа для научного описания проекта.</tspan></text><text x="1520" y="970" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="end">Источник: book/01_platform_architecture/data_model.md</text></svg>
