y="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#4f46e5" text-anchor="end">8 ч</text><text x="854" y="498" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#1f2937" text-anchor="start"><tspan x="854" dy="0">Документы, коммуникация и</tspan><tspan x="854" dy="21">повседневная профессиональная</tspan><tspan x="854" dy="21">рутина</tspan></text><text x="854" y="566" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="854" dy="0">ПК-ИИ-7, ПК-ИИ-2, ПК-ИИ-8</tspan></text><rect x="1210" y="430" width="320" height="170" rx="8" fill="#fff1f2" stroke="#dc2626" stroke-width="1.8"/><text x="1234" y="464" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start">Модуль 8</text><text x="1506" y="464" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#dc2626" text-anchor="end">14 ч</text><text x="1234" y="498" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#1f2937" text-anchor="start"><tspan x="1234" dy="0">Риски, этика, безопасность и</tspan><tspan x="1234" dy="21">итоговый проект</tspan></text><text x="1234" y="566" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="1234" dy="0">ПК-ИИ-9, ПК-ИИ-10</tspan></text><line x1="390" y1="260" x2="435" y2="260" stroke="#475569" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="770" y1="260" x2="815" y2="260" stroke="#475569" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="1150" y1="260" x2="1195" y2="260" stroke="#475569" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><path d="M1370 345 C1370 390, 230 390, 230 425" fill="none" stroke="#475569" stroke-width="2.0" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><line x1="390" y1="515" x2="435" y2="515" stroke="#475569" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="770" y1="515" x2="815" y2="515" stroke="#475569" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="1150" y1="515" x2="1195" y2="515" stroke="#475569" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="90" y="710" width="1420" height="118" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/><text x="120" y="746" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#1f2937" text-anchor="start">Логика прохождения</text><text x="120" y="778" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="120" dy="0">Последовательность движется от концептуального понимания ИИ и постановки запросов к профессиональным применениям, затем к безопасности, этике и итоговому</tspan><tspan x="120" dy="23">проекту. Модуль 8 не отменяет предыдущие результаты, а собирает их в переносимую разработку для дисциплины слушателя.</tspan></text><rect x="120" y="860" width="75" height="30" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.2"/><text x="157.5" y="880" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="700" fill="#155e75" text-anchor="middle">72 часа</text><rect x="225" y="860" width="93" height="30" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/><text x="271.5" y="880" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">8 модулей</text><rect x="350" y="860" width="174" height="30" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.2"/><text x="437.0" y="880" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="700" fill="#3730a3" text-anchor="middle">ПК-ИИ-1 — ПК-ИИ-10</text><rect x="560" y="860" width="147" height="30" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.2"/><text x="633.5" y="880" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="700" fill="#9a3412" text-anchor="middle">итоговый проект</text><text x="1520" y="940" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="end">Источник: data/branches/11_platform_course_integration/platform_course_integration.yaml</text></svg>
