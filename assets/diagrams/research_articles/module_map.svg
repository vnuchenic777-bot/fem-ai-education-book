</defs><text x="60" y="58" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">Карта модулей курса ДПО по ИИ-инструментам</text><text x="60" y="92" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Схема фиксирует апробационную конфигурацию программы: восемь модулей, 72 академических часа и связь модулей с компетенциями ПК-ИИ-1 — ПК-ИИ-10.</tspan></text><rect x="70" y="175" width="320" height="170" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8"/><text x="94" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start">Модуль 1</text><text x="366" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#0891b2" text-anchor="end">6 ч</text><text x="94" y="243" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#1f2937" text-anchor="start"><tspan x="94" dy="0">Введение: зачем преподавателю</tspan><tspan x="94" dy="21">ИИ</tspan></text><text x="94" y="311" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="94" dy="0">ПК-ИИ-1</tspan></text><rect x="450" y="175" width="320" height="170" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8"/><text x="474" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start">Модуль 2</text><text x="746" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#0891b2" text-anchor="end">8 ч</text><text x="474" y="243" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#1f2937" text-anchor="start"><tspan x="474" dy="0">Как устроены нейронные сети на</tspan><tspan x="474" dy="21">понятном уровне</tspan></text><text x="474" y="311" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="474" dy="0">ПК-ИИ-1</tspan></text><rect x="830" y="175" width="320" height="170" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="854" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start">Модуль 3</text><text x="1126" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#16a34a" text-anchor="end">8 ч</text><text x="854" y="243" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#1f2937" text-anchor="start"><tspan x="854" dy="0">Большие языковые модели и</tspan><tspan x="854" dy="21">генеративный ИИ</tspan></text><text x="854" y="311" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="854" dy="0">ПК-ИИ-1, ПК-ИИ-3, ПК-ИИ-8</tspan></text><rect x="1210" y="175" width="320" height="170" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="1234" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start">Модуль 4</text><text x="1506" y="209" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#16a34a" text-anchor="end">10 ч</text><text x="1234" y="243" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#1f2937" text-anchor="start"><tspan x="1234" dy="0">Постановка запросов как</tspan><tspan x="1234" dy="21">профессиональный навык</tspan></text><text x="1234" y="311" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="1234" dy="0">ПК-ИИ-2, ПК-ИИ-1</tspan></text><rect x="70" y="430" width="320" height="170" rx="8" fill=