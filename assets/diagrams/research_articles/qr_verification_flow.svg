<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img"><rect width="100%" height="100%" fill="#ffffff"/><defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
  </marker>
  <style>
    .small { font-size: 13px; fill: #64748b; }
  </style>
</defs><text x="60" y="58" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">QR-проверка и минимизация раскрытия данных</text><text x="60" y="92" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Схема показывает публичный контур проверки документа по verificationCode: QR ведёт к ограниченному ответу платформы, а не к раскрытию внутренних данных</tspan><tspan x="60" dy="23">слушателя.</tspan></text><rect x="55" y="175" width="205" height="110" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="73" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="73" dy="0">PDF-документ</tspan></text><text x="73" y="236" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="73" dy="0">содержит QR и</tspan><tspan x="73" dy="20">реквизиты</tspan></text><line x1="260" y1="230" x2="303" y2="230" stroke="#334155" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="310" y="175" width="205" height="110" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="328" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="328" dy="0">QR /</tspan><tspan x="328" dy="22">verificationUrl</tspan></text><text x="328" y="236" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="328" dy="0">код не совпадает с</tspan><tspan x="328" dy="20">рег. номером</tspan></text><line x1="515" y1="230" x2="558" y2="230" stroke="#334155" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="565" y="175" width="205" height="110" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="583" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="583" dy="0">Публичный</tspan><tspan x="583" dy="22">endpoint</tspan></text><text x="583" y="236" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="583" dy="0">GET /verify/{code};</tspan><tspan x="583" dy="20">rate limit</tspan></text><line x1="770" y1="230" x2="813" y2="230" stroke="#334155" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="820" y="175" width="205" height="110" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="838" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="838" dy="0">Поиск</tspan><tspan x="838" dy="22">IssuedCertificate</tspan></text><text x="838" y="236" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="838" dy="0">по неугадываемому</tspan><tspan x="838" dy="20">verificationCode</tspan></text><line x1="1025" y1="230" x2="1068" y2="230" stroke="#334155" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1075" y="175" width="205" height="110" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="1093" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1093" dy="0">Проверка статуса</tspan></text><text x="1093" y="236" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1093" dy="0">issued, revoked,</tspan><tspan x="1093" dy="20">reissued или ошибка</tspan></text><line x1="1280" y1="230" x2="1323" y2="230" stroke="#334155" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1330" y="175" width="205" height="110" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/><text x="1348" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1348" dy="0">Публичный ответ</tspan></text><text x="1348" y="236" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1348" dy="0">минимальный набор</tspan><tspan x="1348" dy="20">сведений</tspan></text><path d="M1180 285 C1130 360, 885 360, 785 305" fill="none" stroke="#0f766e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><text x="985" y="382" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#0f766e" text-anchor="middle">AuditLog: certificate.verified.public или certificate.verification.failed</text><rect x="80" y="455" width="660" height="260" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.6"/><text x="110" y="492" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="700" fill="#166534" text-anchor="start">Публично допустимый минимум</text><text x="125" y="535" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#166534" text-anchor="start">•</text><text x="150" y="535" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">valid и status документа</text><text x="125" y="569" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#166534" text-anchor="start">•</text><text x="150" y="569" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">registrationNumber</text><text x="125" y="603" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#166534" text-anchor="start">•</text><text x="150" y="603" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">courseTitle и hours</text><text x="125" y="637" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#166534" text-anchor="start">•</text><text x="150" y="637" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">issuedAt и issuer</text><text x="125" y="671" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#166534" text-anchor="start">•</text><text x="150" y="671" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">holderName только ограниченно и при согласовании</text><rect x="860" y="455" width="660" height="260" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.6"/><text x="890" y="492" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="700" fill="#9f1239" text-anchor="start">Не раскрывать на публичной странице</text><text x="905" y="535" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#9f1239" text-anchor="start">•</text><text x="930" y="535" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">userId, email, phone и внутренние идентификаторы</text><text x="905" y="569" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#9f1239" text-anchor="start">•</text><text x="930" y="569" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">storageKey, fileHash и служебные данные файла</text><text x="905" y="603" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#9f1239" text-anchor="start">•</text><text x="930" y="603" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">signatureMetadata без отдельного основания</text><text x="905" y="637" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#9f1239" text-anchor="start">•</text><text x="930" y="637" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">внутренний AuditLog, IP, userAgent</text><text x="905" y="671" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="20" font-weight="400" fill="#9f1239" text-anchor="start">•</text><text x="930" y="671" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#1f2937" text-anchor="start">причины отзыва и комментарии проверяющих</text><rect x="80" y="760" width="1440" height="68" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.6"/><text x="110" y="800" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="700" fill="#9a3412" text-anchor="start">Ключевой принцип: QR-проверка подтверждает статус записи платформы, но не заменяет подпись, регистрацию и юридически утверждённый порядок выдачи.</text><text x="1510" y="862" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="end">Источник: qr_verification_flow.ipynb и implementation_spec.yaml</text></svg>
