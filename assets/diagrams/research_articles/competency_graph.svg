<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1100" viewBox="0 0 1600 1100" role="img"><rect width="100%" height="100%" fill="#ffffff"/><defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
  </marker>
  <style>
    .small { font-size: 13px; fill: #64748b; }
  </style>
</defs><text x="60" y="58" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">Граф компетентностной модели ПК-ИИ-1 — ПК-ИИ-10</text><text x="60" y="92" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Визуализация показывает методическую связность компетенций курса ДПО: от понимания ИИ и постановки запросов к профессиональным применениям, ограничениям и</tspan><tspan x="60" dy="23">итоговому переносу в дисциплину.</tspan></text><text x="197" y="150" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#0891b2" text-anchor="middle">Основание</text><text x="530" y="150" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#15803d" text-anchor="middle">Операционные навыки</text><text x="910" y="118" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#c2410c" text-anchor="middle">Профессиональные применения</text><text x="1288" y="270" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#b91c1c" text-anchor="middle">Границы</text><text x="1288" y="500" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#4338ca" text-anchor="middle">Интеграция</text><rect x="80" y="235" width="235" height="126" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.8"/><text x="98" y="265" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-1</text><text x="98" y="293" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="98" dy="0">Концептуальная</tspan><tspan x="98" dy="19">грамотность об ИИ</tspan></text><text x="98" y="343" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М1, М2, М3</text><rect x="405" y="195" width="250" height="126" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="423" y="225" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-2</text><text x="423" y="253" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="423" dy="0">Постановка запросов как</tspan><tspan x="423" dy="19">профессиональный навык</tspan></text><text x="423" y="303" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М4, сквозно</text><rect x="405" y="365" width="250" height="126" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.8"/><text x="423" y="395" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-3</text><text x="423" y="423" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="423" dy="0">Критическая проверка</tspan><tspan x="423" dy="19">ответов ИИ</tspan></text><text x="423" y="473" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М3, М6</text><rect x="760" y="150" width="300" height="112" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/><text x="778" y="180" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-4</text><text x="778" y="208" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="778" dy="0">Применение ИИ в подготовке</tspan><tspan x="778" dy="19">учебных материалов</tspan></text><text x="778" y="244" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М5</text><rect x="760" y="280" width="300" height="112" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/><text x="778" y="310" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-5</text><text x="778" y="338" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="778" dy="0">Проектирование заданий с</tspan><tspan x="778" dy="19">обязательным использованием ИИ</tspan><tspan x="778" dy="19">студентами</tspan></text><text x="778" y="374" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М5</text><rect x="760" y="410" width="300" height="112" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/><text x="778" y="440" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-6</text><text x="778" y="468" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="778" dy="0">Применение ИИ в научной и</tspan><tspan x="778" dy="19">аналитической работе</tspan></text><text x="778" y="504" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М6</text><rect x="760" y="540" width="300" height="112" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/><text x="778" y="570" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-7</text><text x="778" y="598" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="778" dy="0">Применение ИИ в документообороте</tspan><tspan x="778" dy="19">и повседневной профессиональной</tspan><tspan x="778" dy="19">рутине</tspan></text><text x="778" y="634" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М7</text><rect x="760" y="670" width="300" height="112" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/><text x="778" y="700" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-8</text><text x="778" y="728" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="778" dy="0">Многомодальный ИИ для создания</tspan><tspan x="778" dy="19">визуальных, аудио-, видео- и</tspan><tspan x="778" dy="19">презентационных материалов</tspan></text><text x="778" y="764" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М3, М5, М7</text><rect x="1150" y="310" width="275" height="126" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/><text x="1168" y="340" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-9</text><text x="1168" y="368" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1168" dy="0">Безопасность, этика и</tspan><tspan x="1168" dy="19">правовые границы применения</tspan><tspan x="1168" dy="19">ИИ</tspan></text><text x="1168" y="418" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М8, сквозно</text><rect x="1150" y="540" width="275" height="126" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/><text x="1168" y="570" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="19" font-weight="700" fill="#111827" text-anchor="start">ПК-ИИ-10</text><text x="1168" y="598" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1168" dy="0">ИИ-лидерство в собственной</tspan><tspan x="1168" dy="19">дисциплине</tspan></text><text x="1168" y="648" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="start">Модули: М8</text><line x1="315" y1="298" x2="390" y2="258" stroke="#0f766e" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="315" y1="298" x2="390" y2="428" stroke="#0f766e" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><path d="M655 258 C690 250, 710 220, 745 205" fill="none" stroke="#92400e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M655 258 C700 320, 700 420, 745 485" fill="none" stroke="#92400e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M655 428 C705 440, 710 610, 745 725" fill="none" stroke="#92400e" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M1060 205 C1115 225, 1105 318, 1135 365" fill="none" stroke="#b91c1c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M1060 336 C1120 350, 1110 380, 1135 386" fill="none" stroke="#b91c1c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M1060 596 C1110 590, 1110 603, 1135 603" fill="none" stroke="#4f46e5" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M1425 373 C1490 415, 1490 556, 1432 603" fill="none" stroke="#64748b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><text x="1500" y="485" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="middle"><tspan x="1500" dy="0">ограничения</tspan><tspan x="1500" dy="17">учитываются при</tspan><tspan x="1500" dy="17">итоговом переносе</tspan></text><rect x="90" y="870" width="1420" height="110" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/><text x="118" y="902" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start">Как читать граф</text><text x="118" y="932" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="118" dy="0">Стрелки показывают методическую связность, а не жёсткую юридическую последовательность освоения. Каждая компетенция подтверждается через артефакт и</tspan><tspan x="118" dy="22">тестовую или практическую проверку, а ПК-ИИ-10 собирает результаты в итоговом проекте.</tspan></text><rect x="118" y="1012" width="183" height="30" rx="8" fill="#ecfeff" stroke="#0891b2" stroke-width="1.2"/><text x="209.5" y="1032" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="700" fill="#155e75" text-anchor="middle">артефакт + проверка</text><rect x="330" y="1012" width="129" height="30" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.2"/><text x="394.5" y="1032" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">цифровой след</text><rect x="500" y="1012" width="147" height="30" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.2"/><text x="573.5" y="1032" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="700" fill="#3730a3" text-anchor="middle">итоговый проект</text><text x="1540" y="1072" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="end">Источник: book/05_certification/data/competencies.yaml</text></svg>
