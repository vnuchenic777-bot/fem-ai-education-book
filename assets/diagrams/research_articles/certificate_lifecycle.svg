<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="840" viewBox="0 0 1500 840" role="img"><rect width="100%" height="100%" fill="#ffffff"/><defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
  </marker>
  <style>
    .small { font-size: 13px; fill: #64748b; }
  </style>
</defs><text x="60" y="58" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="30" font-weight="700" fill="#111827" text-anchor="start">Жизненный цикл цифрового документа результата обучения</text><text x="60" y="92" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="17" font-weight="400" fill="#64748b" text-anchor="start"><tspan x="60" dy="0">Схема фиксирует проектные статусы записи IssuedCertificate и условия переходов; она не утверждает юридический порядок выдачи сертификата или</tspan><tspan x="60" dy="23">удостоверения.</tspan></text><rect x="70" y="145" width="285" height="88" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="88" y="176" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="88" dy="0">Права инициатора</tspan></text><text x="88" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="88" dy="0">роль и организация проверены</tspan></text><line x1="355" y1="189" x2="405" y2="189" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="420" y="145" width="285" height="88" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="438" y="176" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="438" dy="0">Курс завершён</tspan></text><text x="438" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="438" dy="0">Enrollment имеет итоговый статус</tspan><tspan x="438" dy="20">completed</tspan></text><line x1="705" y1="189" x2="755" y2="189" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="770" y="145" width="285" height="88" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="788" y="176" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="788" dy="0">Компетенции подтверждены</tspan></text><text x="788" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="788" dy="0">ПК-ИИ-1 — ПК-ИИ-10: артефакт +</tspan><tspan x="788" dy="20">проверка</tspan></text><line x1="1055" y1="189" x2="1105" y2="189" stroke="#64748b" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="1120" y="145" width="285" height="88" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.8"/><text x="1138" y="176" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1138" dy="0">Шаблон активен</tspan></text><text x="1138" y="206" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1138" dy="0">CertificateTemplate выбран и</tspan><tspan x="1138" dy="20">разрешён</tspan></text><line x1="760" y1="235" x2="760" y2="285" stroke="#64748b" stroke-width="2.0" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="95" y="325" width="225" height="92" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/><text x="113" y="356" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start"><tspan x="113" dy="0">draft</tspan></text><text x="113" y="386" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="113" dy="0">подготовлен, но не</tspan><tspan x="113" dy="20">выдан</tspan></text><rect x="385" y="325" width="225" height="92" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="1.8"/><text x="403" y="356" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start"><tspan x="403" dy="0">partial</tspan></text><text x="403" y="386" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="403" dy="0">частичное освоение или</tspan><tspan x="403" dy="20">доработка</tspan></text><rect x="680" y="325" width="225" height="92" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.8"/><text x="698" y="356" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start"><tspan x="698" dy="0">issued</tspan></text><text x="698" y="386" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="698" dy="0">выдан после</tspan><tspan x="698" dy="20">подтверждения условий</tspan></text><rect x="1010" y="260" width="225" height="92" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.8"/><text x="1028" y="291" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1028" dy="0">revoked</tspan></text><text x="1028" y="321" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1028" dy="0">отозван по основанию</tspan></text><rect x="1010" y="435" width="225" height="92" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.8"/><text x="1028" y="466" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="22" font-weight="700" fill="#111827" text-anchor="start"><tspan x="1028" dy="0">reissued</tspan></text><text x="1028" y="496" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="15" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="1028" dy="0">перевыпущен с</tspan><tspan x="1028" dy="20">сохранением связи</tspan></text><line x1="320" y1="371" x2="370" y2="371" stroke="#334155" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="610" y1="371" x2="665" y2="371" stroke="#334155" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><path d="M320 350 C445 260, 560 260, 680 350" fill="none" stroke="#334155" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><path d="M905 360 C945 320, 960 304, 995 304" fill="none" stroke="#b91c1c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M905 395 C950 450, 960 480, 995 480" fill="none" stroke="#4338ca" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/><path d="M1235 480 C1330 480, 1330 371, 918 371" fill="none" stroke="#4338ca" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="7 7" marker-end="url(#arrow)"/><text x="485" y="284" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="middle">после доработки</text><text x="520" y="295" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#64748b" text-anchor="middle">возможен прямой переход draft → issued при полном выполнении условий</text><text x="1280" y="376" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="14" font-weight="400" fill="#4338ca" text-anchor="middle">новая версия документа</text><rect x="95" y="585" width="1220" height="92" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.6"/><text x="122" y="620" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="18" font-weight="700" fill="#1f2937" text-anchor="start">AuditLog сопровождает критические действия</text><text x="122" y="650" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="400" fill="#1f2937" text-anchor="start"><tspan x="122" dy="0">Фиксируются generation, issued, revoked, reissued, downloaded, verified.public и verification.failed. Отзыв и повторная выдача</tspan><tspan x="122" dy="22">требуют основания, прав доступа и записи в журнале.</tspan></text><rect x="95" y="710" width="1220" height="62" rx="8" fill="#fff1f2" stroke="#f43f5e" stroke-width="1.6"/><text x="122" y="748" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="16" font-weight="700" fill="#9f1239" text-anchor="start">Юридический статус, подпись, регистрация и хранение утверждаются отдельно образовательной организацией.</text><text x="1440" y="808" font-family="Inter, Arial, 'Noto Sans', sans-serif" font-size="13" font-weight="400" fill="#64748b" text-anchor="end">Источник: book/05_certification/implementation_spec.yaml</text></svg>
