competencies:
- code: ПК-ИИ-1
  name: Концептуальная грамотность об ИИ
  modules:
  - '1'
  - '2'
  - '3'
  evidence_artifact: Короткое объяснение принципов ИИ без мистификации с примером
    из собственной дисциплины.
  evidence_test: Концептуальный тест по принципам нейронных сетей, языковых моделей
    и природе ошибок.
- code: ПК-ИИ-2
  name: Постановка запросов как профессиональный навык
  modules:
  - '4'
  - сквозно
  evidence_artifact: Личная библиотека из 10–15 профессиональных запросов и разбор
    трёх итераций улучшения.
  evidence_test: Практический тест на составление запросов под учебные, методические
    и организационные задачи.
- code: ПК-ИИ-3
  name: Критическая проверка ответов ИИ
  modules:
  - '3'
  - '6'
  evidence_artifact: 'Разметка сгенерированного текста: проверяемые утверждения, результаты
    проверки, исправления.'
  evidence_test: Тест на распознавание галлюцинаций и определение утверждений, требующих
    проверки.
- code: ПК-ИИ-4
  name: Применение ИИ в подготовке учебных материалов
  modules:
  - '5'
  evidence_artifact: Фрагмент занятия с журналом использования ИИ и правками преподавателя.
  evidence_test: Тест по допустимым сценариям применения ИИ в подготовке учебных материалов.
- code: ПК-ИИ-5
  name: Проектирование заданий с обязательным использованием ИИ студентами
  modules:
  - '5'
  evidence_artifact: Пилотное задание для собственной дисциплины с обязательным использованием
    ИИ, журналом запросов и критериями оценивания.
  evidence_test: 'Анализ заданий по категориям: обязательное, возможное или недопустимое
    использование ИИ.'
- code: ПК-ИИ-6
  name: Применение ИИ в научной и аналитической работе
  modules:
  - '6'
  evidence_artifact: Структура научного текста или аналитической записки с декларацией
    использования ИИ.
  evidence_test: Сценарный тест на допустимые и недопустимые способы применения ИИ
    в научной работе.
- code: ПК-ИИ-7
  name: Применение ИИ в документообороте и повседневной профессиональной рутине
  modules:
  - '7'
  evidence_artifact: Переработанный рабочий документ и шаблон запроса для регулярной
    административной задачи.
  evidence_test: Практический тест на выбор инструмента и формата запроса для офисных
    задач.
- code: ПК-ИИ-8
  name: Многомодальный ИИ для создания визуальных, аудио-, видео- и презентационных
    материалов
  modules:
  - '3'
  - '5'
  - '7'
  evidence_artifact: Комплект из визуального материала, аудио- или видеофрагмента
    и презентации с журналом запросов.
  evidence_test: Тест на различение задач генерации, редактирования и оценки пригодности
    результата.
- code: ПК-ИИ-9
  name: Безопасность, этика и правовые границы применения ИИ
  modules:
  - '8'
  - сквозно
  evidence_artifact: Чек-лист допустимости применения ИИ и анализ типовых преподавательских
    ситуаций.
  evidence_test: Сценарный тест по ситуациям риска с кратким обоснованием выбора.
- code: ПК-ИИ-10
  name: ИИ-лидерство в собственной дисциплине
  modules:
  - '8'
  evidence_artifact: Итоговый проект интеграции ИИ в дисциплину или РПМ.
  evidence_test: Асинхронная видео-защита итогового проекта и ответы на вопросы преподавателя
    курса.
