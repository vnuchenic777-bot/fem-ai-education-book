  priority: P0
  done: получены или зафиксированы ответы на вопросы из раздела questions_for_organization
acceptance_criteria:
- Создан файл 09_LEGAL_ETHICS_SECURITY_DPO_AI.md с полным методическим разделом для курса ДПО.
- Создан файл 09_CHECKLIST_SAFE_AI_USE.md с самостоятельным чек-листом безопасного применения ИИ.
- Создано ТЗ в формате Markdown и JSON/YAML, пригодное для загрузки в Codex/Claude и инженерные среды.
- Все таблицы представлены в машинно-читаемой форме как массивы объектов, а не только визуальные таблицы.
- В документе нет выдуманных номеров законов, приказов, дат, локальных актов или юридических формулировок.
- 'В нормативно чувствительных местах используется формулировка: «требует проверки по официальным источникам и внутренним
  документам образовательной организации».'
- 'Описаны требования к платформенной реализации: LegalDocument, UserConsent, AuditLog, role-based access, 2FA, StorageObject,
  ИИ-помощная проверка с подтверждением человека.'
- 'Описаны требования к оцениванию ПК-ИИ-9: артефакт, тест, рубрика, критерии освоения, основания для доработки.'
- 'Подготовлена таблица ситуаций: ситуация, риск, решение, зона нормативной проверки.'
- Подготовлен перечень вопросов к образовательной организации.
