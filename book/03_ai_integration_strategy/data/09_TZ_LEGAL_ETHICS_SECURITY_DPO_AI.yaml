metadata:
  project: ФЭМ СПБГТИ(ТУ) Образование
  branch: Ветка 9. Правовые границы, безопасность и этика
  module_title: Правовые границы, безопасность и профессиональная ответственность применения ИИ преподавателем
  version: v0.1
  date: '2026-05-28'
  status: draft_for_implementation
  intended_for:
  - методисты ДПО
  - разработчики платформы
  - AI coding agents
  - Codex
  - Claude
  format_note: Таблицы представлены как массивы объектов в JSON/YAML, чтобы инженерные среды не теряли структуру.
verification_policy:
  rule: Не выдумывать нормативные требования, номера приказов, даты, названия локальных актов и юридические формулировки.
  phrase: требует проверки по официальным источникам и внутренним документам образовательной организации
source_documents:
- file: COURSE_DPO_AI_72H.md
  role: структура курса, модуль 8, компетенция ПК-ИИ-9
- file: LEGAL_PRIVACY.md
  role: правовая зона платформы, согласия, версии документов
- file: ASSESSMENT_CERTIFICATION.md
  role: модель оценивания, ИИ-помощная проверка с подтверждением человеком
- file: ACCESS_ROLES_ADMIN.md
  role: роли, доступы, аудит, 2FA для администраторов
- file: API_SPEC.md
  role: Legal API, Audit API, Auth, Storage, Learning, Assessment
- file: DATA_MODEL.md
  role: LegalDocument, UserConsent, AuditLog, StorageObject, AssessmentItem, GradeScheme
- file: ARCHITECTURE.md
  role: безопасность, модульная архитектура, раздельное хранение файлов и данных
- file: FACULTY_AI_STRATEGY.md
  role: стратегия обязательной интеграции ИИ в РПМ и требования к академической добросовестности
scope:
- методическая разработка раздела курса по правовым границам, безопасности и профессиональной ответственности применения ИИ;
- подготовка чек-листа безопасного применения ИИ преподавателем;
- разработка сценарных заданий и теста для подтверждения ПК-ИИ-9;
- подготовка таблицы ситуаций, рисков, решений и зон нормативной проверки;
- 'формулирование требований к платформенной реализации правового контура: согласия, версии документов, аудит действий, роли,
  2FA, хранение файлов и данных;'
- подготовка перечня вопросов, которые необходимо согласовать с образовательной организацией.
out_of_scope:
- подготовка финальных юридических текстов политики обработки персональных данных, пользовательского соглашения или согласий;
- утверждение юридического статуса сертификата или удостоверения;
- выдумывание номеров законов, приказов, локальных актов, дат, реквизитов документов;
- самостоятельное принятие решения о допустимости передачи персональных данных во внешние ИИ-сервисы;
- реализация программного кода без отдельной инженерной задачи и ревью безопасности;
- автоматическое выставление официальной итоговой оценки ИИ без подтверждения преподавателем или комиссией.
deliverables:
- 09_LEGAL_ETHICS_SECURITY_DPO_AI.md
- 09_CHECKLIST_SAFE_AI_USE.md
- 09_TZ_LEGAL_ETHICS_SECURITY_DPO_AI.md
- 09_TZ_LEGAL_ETHICS_SECURITY_DPO_AI.json
- 09_TZ_LEGAL_ETHICS_SECURITY_DPO_AI.yaml
content_requirements:
- id: CNT-001
  section: Персональные данные
  must_include:
  - какие данные в образовательном процессе могут относиться к персональным;
  - почему загрузка данных студентов во внешние ИИ-сервисы является рисковой операцией;
  - что такое обезличивание в учебной практике;
  - какие действия требуют нормативной проверки.
  must_not_include:
  - выдуманные ссылки на нормативные акты;
  - утверждение, что любые данные можно передавать в ИИ после удаления ФИО.
- id: CNT-002
  section: Конфиденциальная информация
  must_include:
  - примеры внутренней служебной информации;
  - риски передачи служебных документов во внешние сервисы;
  - правило приостановки действия при сомнении;
  - необходимость проверки внутренних регламентов.
  must_not_include:
  - самостоятельное определение статуса служебного документа без согласования.
- id: CNT-003
  section: Авторское право и авторская ответственность
  must_include:
  - разграничение машинной генерации и авторского вклада преподавателя;
  - требование проверки источников и заимствований;
  - осторожность при создании визуальных материалов в узнаваемом стиле конкретного автора;
  - необходимость проверки локальных требований по учебным материалам.
  must_not_include:
  - утверждение, что любой сгенерированный ИИ материал свободен от правовых ограничений.
- id: CNT-004
  section: Академическая добросовестность
  must_include:
  - отличие допустимой помощи ИИ от подмены самостоятельного действия;
  - журнал запросов и итераций;
  - проверка фактов;
  - описание вклада студента;
  - условия возврата работы на доработку.
  must_not_include:
  - полный запрет ИИ без учета задач курса;
  - полное разрешение ИИ без требований к процессу.
- id: CNT-005
  section: Прозрачность применения ИИ
  must_include:
  - декларация использования ИИ преподавателем и студентом;
  - что указывается в журнале работы с ИИ;
  - как прозрачность связана с оцениванием;
  - как сохраняется профессиональная ответственность преподавателя.
  must_not_include:
  - представление прозрачности как формального предупреждения без проверяемых элементов.
platform_requirements:
- id: PL-LEGAL-001
  name: Версионирование правовых документов
  requirement: 'В платформе должны храниться юридические документы как версии: тип документа, версия, статус, дата публикации,
    организация, текст документа.'
  data_model:
  - LegalDocument
  acceptance: Система может показать пользователю активную версию документа и отличить ее от архивной версии.
- id: PL-LEGAL-002
  name: Фиксация согласий пользователя
  requirement: 'Факт принятия пользователем документа должен храниться отдельно от текста документа: пользователь, документ,
    версия, дата и время принятия, IP и user-agent при допустимости такой фиксации.'
  data_model:
  - UserConsent
  acceptance: По каждому пользователю можно установить, какую именно версию документа он принял и когда.
- id: PL-LEGAL-003
  name: Блокировка доступа до принятия обязательных документов
  requirement: Если пользователь не принял все обязательные активные документы своей организации, клиент должен показать экран
    принятия согласий до доступа к личному кабинету и курсам.
  data_model:
  - LegalDocument
  - UserConsent
  api:
  - /api/v1/legal/documents/active
  - /api/v1/legal/consents
  - /api/v1/legal/consents/me
  acceptance: Пользователь без актуальных согласий не получает доступ к назначенному курсу.
- id: PL-SEC-001
  name: Ролевой и контекстный доступ
  requirement: Доступ к правовым документам, пользовательским данным, заданиям, проверкам и журналам действий должен зависеть
    от роли, организации, курса, запуска курса и конкретного действия.
  data_model:
  - Role
  - Permission
  - OrganizationMembership
  - CourseRunTeacher
  acceptance: Слушатель не видит административные разделы, чужие работы, аудит-журнал и данные пользователей чужой организации.
- id: PL-SEC-002
  name: 2FA и усиленная защита администраторов
  requirement: 'Для администраторов должна быть предусмотрена двухфакторная аутентификация. Для Super Admin требуется усиленный
    контур: WebAuthn/FIDO2 или аппаратный ключ, резервные коды, повторное подтверждение критических действий.'
  data_model:
  - AuthenticatorCredential
  - RecoveryCode
  - RefreshSession
  api:
  - /api/v1/auth/2fa/status
  acceptance: Администраторские действия не должны выполняться без актуальной сессии и требуемого уровня подтверждения.
- id: PL-AUDIT-001
  name: Аудит критических действий
  requirement: Необходимо фиксировать создание пользователей, изменение ролей, принятие согласий, публикацию материалов, изменение
    оценок, выдачу документов, блокировку пользователей, ручные решения по ИИ-помощной проверке.
  data_model:
  - AuditLog
  api:
  - /api/v1/audit
  acceptance: 'Администратор с правами аудита может восстановить цепочку критического действия: кто, когда, что изменил и
    в каком контексте.'
- id: PL-AI-REVIEW-001
  name: ИИ-помощная проверка только с подтверждением человека
  requirement: ИИ может формировать предварительный анализ открытого ответа или артефакта, но официальное решение по ДПО подтверждается
    преподавателем, проверяющим или комиссией.
  data_model:
  - AiReviewSuggestion
  - AssignmentReview
  - Grade
  api:
  - /api/v1/submissions/:id/ai-review
  - /api/v1/submissions/:id/reviews
  acceptance: ИИ-предложение не изменяет официальный статус работы без действия уполномоченного пользователя.
- id: PL-STORAGE-001
  name: Раздельное хранение файлов и данных
  requirement: Учебные материалы, файлы, видео, загруженные артефакты и документы не должны храниться непосредственно в таблицах
    базы; в БД хранится метаинформация и ссылка на объект хранения.
  data_model:
  - StorageObject
  acceptance: Доступ к скачиванию или просмотру файла проверяется через права пользователя и контекст курса.
- id: PL-MODERATION-001
  name: Модерация учебных материалов
  requirement: Перед публикацией открытых или организационных материалов должна быть предусмотрена автоматическая и/или ручная
    модерация содержания, если материал может нарушать правила платформы или содержать правовые риски.
  data_model:
  - ContentModerationResult
  api:
  - /api/v1/moderation/check
  acceptance: Материал с отмеченным риском не публикуется до решения ответственного проверяющего.
assessment_requirements:
- id: ASM-001
  name: Артефакт ПК-ИИ-9
  description: Слушатель готовит чек-лист безопасного применения ИИ под собственный рабочий контекст и анализирует 3-5 типовых
    преподавательских ситуаций.
  evidence:
  - чек-лист
  - таблица анализа ситуаций
  - краткое обоснование решений
  grading: rubric + pass_fail; ИИ-помощный анализ допускается только как предварительный комментарий.
- id: ASM-002
  name: Сценарный тест ПК-ИИ-9
  description: Тест из 15-20 ситуаций с выбором решения и кратким обоснованием для части вопросов.
  question_types:
  - single_choice
  - multiple_choice
  - short_text
  - scenario_open
  grading: часть вопросов проверяется автоматически, открытые обоснования проверяются преподавателем или с ИИ-помощником с
    подтверждением человека.
- id: ASM-003
  name: Критерии освоения ПК-ИИ-9
  description: Компетенция освоена, если слушатель различает допустимые и недопустимые сценарии применения ИИ, не переносит
    персональные или конфиденциальные данные без оценки допустимости, умеет указать зону нормативной проверки и формулирует
    профессионально ответственное решение.
  minimum: артефакт принят и сценарный тест пройден на уровне, утвержденном преподавателем курса.
scenario_table:
- id: S-001
  situation: Преподаватель хочет загрузить в ИИ таблицу с ФИО студентов, группой и оценками для анализа успеваемости.
  risk: Передача персональных данных во внешний сервис без подтвержденной правовой основы и без проверки локальных правил.
  decision: Не загружать исходную таблицу. Использовать обезличенные агрегированные данные или внутренний утвержденный инструмент.
    Зафиксировать необходимость согласования.
  verification_zone: требует проверки по официальным источникам и внутренним документам образовательной организации
  course_link: ПК-ИИ-9; персональные данные; безопасность образовательной аналитики
- id: S-002
  situation: Слушатель хочет использовать ИИ для проверки студенческой работы, где указаны ФИО и данные группы.
  risk: Раскрытие персональных данных и авторства работы; возможное нарушение правил хранения учебных работ.
  decision: Перед внешней обработкой удалить идентификаторы или использовать внутренний контур. Итоговое решение по оценке
    оставляет преподаватель.
  verification_zone: требует проверки по официальным источникам и внутренним документам образовательной организации
  course_link: ПК-ИИ-9; ИИ-помощная проверка; ответственность преподавателя
- id: S-003
  situation: Преподаватель загружает проект служебной записки кафедры в ИИ для стилистического улучшения.
  risk: Передача внутренней служебной информации и возможных конфиденциальных сведений.
  decision: Оценить статус документа. При наличии внутренних или конфиденциальных сведений использовать обезличенный фрагмент
    либо отказаться от внешнего ИИ.
  verification_zone: требует проверки по официальным источникам и внутренним документам образовательной организации
  course_link: конфиденциальность; служебные документы
- id: S-004
  situation: Студент сдает эссе, полностью созданное ИИ, без журнала запросов, проверок и пояснения личного вклада.
  risk: Отсутствует доказательство самостоятельного учебного действия; нарушается академическая добросовестность.
  decision: Вернуть работу на доработку или оценить как не соответствующую заданию, если требования к журналу работы были
    заранее установлены.
  verification_zone: требует проверки по локальным правилам академической добросовестности образовательной организации
  course_link: академическая добросовестность; задания с обязательным использованием ИИ
- id: S-005
  situation: Преподаватель использует ИИ для создания тестовых вопросов по дисциплине.
  risk: Вопросы могут быть фактически неверными, двусмысленными или не соответствовать уровню студентов.
  decision: Допустимо при обязательной экспертной проверке преподавателем, исправлении формулировок и проверке правильных
    ответов.
  verification_zone: нормативная проверка обычно не требуется, если нет персональных данных и нарушений авторских прав; внутренние
    методические требования могут требовать проверки
  course_link: учебные материалы; ответственность за итоговый материал
- id: S-006
  situation: Преподаватель генерирует изображение для презентации в узнаваемом стиле современного художника.
  risk: Возможные риски авторского права и некорректного использования узнаваемого стиля.
  decision: Избегать прямого указания на стиль конкретного автора. Формулировать запрос через общие визуальные характеристики.
  verification_zone: требует проверки по официальным источникам и внутренним документам образовательной организации
  course_link: авторское право; многомодальный ИИ
- id: S-007
  situation: Преподаватель просит ИИ подготовить отзыв на выпускную квалификационную работу по полному тексту документа.
  risk: Может содержать персональные данные, результаты неопубликованного исследования, конфиденциальные сведения, авторский
    текст студента.
  decision: Не использовать внешний ИИ без проверки допустимости. Допустимы обезличенные фрагменты, общая структура отзыва
    или внутренний утвержденный контур.
  verification_zone: требует проверки по официальным источникам и внутренним документам образовательной организации
  course_link: персональные данные; авторство; академическая добросовестность
- id: S-008
  situation: Слушатель курса ДПО использует ИИ для итогового проекта, но не указывает, какие части были созданы с ИИ.
  risk: Непрозрачность процесса, невозможность оценить компетенции постановки запроса, проверки и авторского вклада.
  decision: Запросить журнал использования ИИ и пояснение правок. Без этого итоговый проект не подтверждает компетенции курса.
  verification_zone: локальные требования к прозрачности использования ИИ требуют проверки
  course_link: ПК-ИИ-9; ПК-ИИ-10; итоговый проект
- id: S-009
  situation: Автор курса публикует материал, автоматически сгенерированный ИИ, без модерации и проверки.
  risk: Фактические ошибки, недопустимый контент, авторско-правовые и репутационные риски.
  decision: Материал проходит ручную проверку и при необходимости автоматическую модерацию до публикации.
  verification_zone: внутренние правила публикации учебных материалов требуют проверки
  course_link: модерация контента; ответственность автора курса
- id: S-010
  situation: Администратор выгружает аудит-журнал и передает его стороннему лицу для анализа.
  risk: Раскрытие действий пользователей, технических данных и потенциально персональных сведений.
  decision: Ограничить доступ к аудиту по роли и основанию. Перед передачей применить обезличивание и согласовать правовой
    режим.
  verification_zone: требует проверки по официальным источникам и внутренним документам образовательной организации
  course_link: аудит действий; безопасность платформы
checklist_blocks:
- id: CHK-1
  name: Персональные данные
  questions:
  - Содержит ли исходный материал сведения, позволяющие прямо или косвенно идентифицировать человека?
  - Можно ли выполнить задачу без передачи персональных данных?
  - Проведено ли обезличивание перед использованием ИИ?
  - Разрешено ли передавать такие данные в выбранный сервис?
  - Есть ли подтвержденная версия согласия или иной правовой основы обработки?
  stop_condition: Если хотя бы один ответ вызывает сомнение, использование внешнего ИИ приостанавливается до проверки.
- id: CHK-2
  name: Конфиденциальность и служебная информация
  questions:
  - Является ли документ внутренним, служебным или непубличным?
  - Есть ли в нем сведения о кафедре, факультете, договоренностях, проверках, финансах или управленческих решениях?
  - Разрешена ли внешняя обработка таких сведений?
  - Можно ли заменить реальный документ учебным примером или обезличенным фрагментом?
  stop_condition: При наличии внутренней или конфиденциальной информации без разрешения использовать внешний ИИ нельзя.
- id: CHK-3
  name: Авторское право и источники
  questions:
  - Используются ли чужие тексты, изображения, презентации, статьи или методические материалы?
  - Не создает ли запрос имитацию узнаваемого стиля конкретного автора?
  - Проверены ли источники, цитаты, ссылки и заимствования?
  - Отделен ли вклад ИИ от вклада преподавателя или студента?
  stop_condition: Если происхождение материала или право использования неясно, материал не публикуется до проверки.
- id: CHK-4
  name: Академическая добросовестность
  questions:
  - Требует ли задание от студента самостоятельного анализа, проверки и обоснования?
  - Есть ли журнал запросов и итераций?
  - Проверены ли факты и источники?
  - Может ли студент объяснить собственный вклад?
  - Оценивается ли процесс работы, а не только итоговый текст?
  stop_condition: Если работа не позволяет оценить вклад студента, она не подтверждает освоение компетенции.
- id: CHK-5
  name: Ответственность преподавателя
  questions:
  - Готов ли преподаватель использовать итоговый материал в своей дисциплине и отвечать за его содержание?
  - Проверены ли фактические утверждения, расчеты и нормативные формулировки?
  - Указаны ли ограничения применения материала?
  - Не подменяет ли ИИ профессиональное решение преподавателя?
  stop_condition: Если преподаватель не может объяснить и защитить результат, материал не должен использоваться как итоговый.
scenario_test_questions:
- id: Q-001
  type: single_choice
  question: Преподаватель хочет загрузить список студентов с ФИО и оценками во внешний ИИ-сервис для анализа успеваемости.
    Какое действие является корректным?
  options:
  - Загрузить список, так как цель образовательная.
  - Загрузить только оценки без ФИО, не проверяя остальные данные.
  - Не загружать исходный список; использовать обезличенные агрегированные данные или внутренний утвержденный контур.
  - Попросить студентов устно согласиться на занятии.
  correct:
  - 2
  explanation: Передача персональных данных во внешний сервис требует правовой и организационной проверки; безопасный базовый
    вариант - обезличивание или внутренний контур.
- id: Q-002
  type: multiple_choice
  question: Какие элементы должны быть в работе студента, если задание требует обязательного использования ИИ?
  options:
  - Журнал запросов и итераций.
  - Проверка ключевых фактов.
  - Описание собственного вклада.
  - Только итоговый текст без пояснений.
  - Обоснование исправлений результата ИИ.
  correct:
  - 0
  - 1
  - 2
  - 4
  explanation: Оценивается управляемое применение ИИ, а не факт генерации текста.
- id: Q-003
  type: single_choice
  question: ИИ предложил преподавателю оценку открытого ответа студента. Как должно приниматься официальное решение по ДПО?
  options:
  - Оценка ИИ автоматически становится официальной.
  - Оценка ИИ применяется, если уверенность модели выше 80%.
  - Преподаватель или проверяющий подтверждает, изменяет или отклоняет предложение ИИ.
  - ИИ-проверка не может использоваться даже как помощник.
  correct:
  - 2
  explanation: ИИ-помощная проверка допускается как предварительный анализ; официальное решение подтверждает человек.
- id: Q-004
  type: short_text
  question: Укажите формулировку, которую нужно использовать в методическом документе, если требуется нормативная конкретизация,
    но официальная ссылка не проверена.
  expected_answer: требует проверки по официальным источникам и внутренним документам образовательной организации
  explanation: Документ не должен выдумывать юридические реквизиты и должен явно обозначать зону проверки.
- id: Q-005
  type: scenario_open
  question: Студент сдал работу, созданную с помощью ИИ, но приложил журнал запросов, проверку фактов и пояснил, какие решения
    принял самостоятельно. Какие элементы должен проверить преподаватель?
  expected_elements:
  - соответствие заданию
  - качество запросов
  - проверка фактов
  - исправления
  - личный вклад студента
  - критерии оценивания
  grading: manual_or_ai_assisted_confirmed_by_human
- id: Q-006
  type: single_choice
  question: Как поступить с учебным материалом, созданным ИИ и содержащим непроверенные ссылки на источники?
  options:
  - Опубликовать, так как ИИ обычно формирует ссылки корректно.
  - Удалить все ссылки и опубликовать текст.
  - Проверить источники, исправить ошибки и только после этого использовать материал.
  - Передать студентам как пример без комментариев.
  correct:
  - 2
  explanation: Преподаватель несет ответственность за итоговый материал, включая источники и фактические утверждения.
- id: Q-007
  type: multiple_choice
  question: Что относится к зонам повышенного риска при использовании ИИ преподавателем?
  options:
  - Персональные данные студентов.
  - Внутренняя служебная переписка кафедры.
  - Открытый учебный пример без реальных данных.
  - Неопубликованный текст студенческой работы.
  - Фрагмент публичной инструкции без персональных данных.
  correct:
  - 0
  - 1
  - 3
  explanation: Персональные, внутренние и авторские материалы требуют повышенной осторожности и проверки допустимости.
- id: Q-008
  type: single_choice
  question: Что является главным признаком прозрачного применения ИИ в учебной работе?
  options:
  - Указание названия сервиса без дополнительных пояснений.
  - Наличие результата, который выглядит профессионально.
  - Понятное разграничение исходной задачи, запросов, правок, проверки и вклада человека.
  - Объемный итоговый текст.
  correct:
  - 2
  explanation: Прозрачность означает возможность восстановить процесс работы и вклад человека.
rubric:
- criterion: Определение правового и организационного риска
  pass: Слушатель выделяет персональные данные, конфиденциальные сведения, авторские материалы или риски академической добросовестности.
  revise: Риск описан общими словами или не связан с ситуацией.
  fail: Слушатель не видит риск там, где он явно присутствует.
- criterion: Выбор безопасного действия
  pass: 'Предложено действие, снижающее риск: обезличивание, отказ от внешней обработки, ручная проверка, согласование, внутренний
    контур.'
  revise: Решение частично снижает риск, но не закрывает ключевой источник опасности.
  fail: Предложено действие, которое усугубляет риск или игнорирует ограничения.
- criterion: Нормативная аккуратность
  pass: Слушатель не выдумывает ссылки и явно указывает зону проверки.
  revise: Есть непроверенные юридические обобщения без реквизитов.
  fail: Указаны вымышленные или неподтвержденные нормативные требования.
- criterion: Связь с преподавательской практикой
  pass: Решение можно применить в реальном учебном, методическом или организационном процессе.
  revise: Решение формально корректно, но неясно, как его выполнить на практике.
  fail: Ответ оторван от образовательной ситуации.
- criterion: Понимание ответственности преподавателя
  pass: Слушатель показывает, что итоговое содержание, оценивание и публикация остаются ответственностью человека.
  revise: Ответ признает ответственность, но не показывает конкретных действий проверки.
  fail: Ответ перекладывает ответственность на ИИ или платформу.
questions_for_organization:
- Какие финальные тексты политики обработки персональных данных, пользовательского соглашения и правил использования платформы
  должны применяться?
- Кто является ответственным подразделением или лицом по вопросам персональных данных и правовой информации на платформе?
- Разрешена ли обработка учебных работ, оценок и иных данных студентов во внешних ИИ-сервисах?
- Есть ли утвержденные требования к обезличиванию учебных данных перед обработкой?
- Какие сведения считаются конфиденциальными для факультета, кафедры и образовательной организации?
- Какие требования действуют к хранению видеолекций, работ слушателей, попыток сдачи и результатов оценивания?
- Какие правила академической добросовестности применяются к использованию ИИ студентами?
- Нужно ли вводить обязательную декларацию использования ИИ в студенческих и преподавательских работах?
- Кто утверждает сценарии применения ИИ в заданиях с обязательным использованием ИИ?
- Кто имеет право принимать окончательное решение по спорным результатам ИИ-помощной проверки?
- Какие действия администраторов считать критическими и требующими повторного подтверждения?
- Какие категории материалов требуют обязательной ручной модерации перед публикацией?
risks:
- risk: Юридические формулировки будут использованы как официальные без проверки.
  impact: Высокий
  mitigation: В каждом нормативно чувствительном блоке указывать формулировку о необходимости проверки по официальным источникам
    и внутренним документам.
- risk: Преподаватели будут воспринимать чек-лист как формальность.
  impact: Средний
  mitigation: Встроить чек-лист в практическое задание и оценивать его на конкретных ситуациях.
- risk: ИИ-помощная проверка будет ошибочно воспринята как автоматическая официальная оценка.
  impact: Высокий
  mitigation: Во всех требованиях фиксировать подтверждение человеком для открытых, итоговых и спорных результатов.
- risk: Платформа будет хранить согласия без версий документов.
  impact: Высокий
  mitigation: Сделать LegalDocument и UserConsent обязательными сущностями; acceptance-критерии проверяют связь с версией
    документа.
- risk: В сценарных заданиях будут слишком общие ситуации без связи с преподавательской практикой.
  impact: Средний
  mitigation: 'Каждая ситуация должна иметь контекст: курс, студент, документ, оценивание, публикация или администрирование.'
backlog:
- id: LEGAL-001
  title: Создать структуру раздела курса по правовым границам ИИ
  owner: методист
  priority: P0
  done: раздел содержит цель, результаты, темы, практику, критерии и связь с ПК-ИИ-9
- id: LEGAL-002
  title: Разработать чек-лист безопасного применения ИИ
  owner: методист
  priority: P0
  done: чек-лист покрывает персональные данные, конфиденциальность, авторство, академическую добросовестность, ответственность
- id: LEGAL-003
  title: Подготовить сценарные задания и тест по ПК-ИИ-9
  owner: методист + преподаватель курса
