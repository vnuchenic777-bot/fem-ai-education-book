document:
  id: 08_FINAL_PROJECT_DPO_AI_IMPLEMENTATION_SPEC
  title: Техническое задание на разработку этапа «Итоговый проект» курса ДПО по ИИ-инструментам
  course_title: 'ИИ-инструменты в преподавательской, научной и повседневной работе: от понимания принципов до практического
    применения'
  version: '0.1'
  status: проект к реализации
  date: '2026-05-28'
  recommended_import_format: Markdown + YAML/JSON
  format_note: 'Markdown используется для чтения человеком и загрузки в LLM-среды. YAML и JSON являются каноническими машинно-читаемыми
    версиями: все таблицы представлены как массивы объектов, чтобы не терялась структура колонок.'
source_context:
- file: COURSE_DPO_AI_72H.md
  role: структура курса, компетенции ПК-ИИ-1 — ПК-ИИ-10, состав итогового проекта
- file: ASSESSMENT_CERTIFICATION.md
  role: модель оценивания, двухчастное доказательство компетенций, сертификат
- file: DATA_MODEL.md
  role: CourseTemplate, CourseRun, AssessmentItem, AssignmentSubmission, Grade, IssuedCertificate
- file: MVP_SPEC.md
  role: 'образовательный MVP: прохождение курса, задания, проверка, прогресс, итоговый статус'
- file: ACCESS_ROLES_ADMIN.md
  role: роли, контекстный доступ, аудит критических действий
- file: LEGAL_PRIVACY.md
  role: правовая зона, персональные данные, согласия и необходимость юридической экспертизы
- file: FACULTY_AI_STRATEGY.md
  role: стратегия интеграции ИИ и заданий с обязательным использованием ИИ в РПМ
stage:
  name: Ветка 8. Итоговый проект
  purpose: Разработать и реализовать итоговый проект как главный продукт курса ДПО, подтверждающий способность преподавателя
    интегрировать ИИ в реальную дисциплину, проектировать задания с обязательным использованием ИИ студентами, обновлять элементы
    РПМ и обосновывать риски, критерии оценивания и дальнейшее развитие дисциплины.
  result_files:
  - 08_FINAL_PROJECT_DPO_AI.md
  - 08_FINAL_PROJECT_TEMPLATE.md
  - 08_FINAL_PROJECT_RUBRIC.yaml
  - 08_FINAL_PROJECT_PLATFORM_SPEC.yaml
  not_in_scope:
  - разработка полного текста всех видеолекций модуля 8
  - юридическое утверждение документа об обучении
  - автоматическая выдача юридически значимого удостоверения без согласования с институтом
  - платежи, подписки, публичная витрина курсов
  - полноценная социальная сеть или чат
core_principles:
- id: P1
  name: Связь с реальной дисциплиной
  description: Итоговый проект выполняется не на абстрактной теме, а на материале дисциплины, которую слушатель реально ведет
    или готовит к ведению.
- id: P2
  name: Проверка профессионального действия, а не декларации
  description: Проект должен содержать конкретные задания, критерии, фрагмент занятия, предложение по РПМ и анализ рисков.
    Общие рассуждения о пользе ИИ не являются достаточным результатом.
- id: P3
  name: Задание с обязательным использованием ИИ как ядро проекта
  description: Задание с обязательным использованием ИИ студентами (AI-mandatory) должно требовать постановки задачи, итеративного
    улучшения запроса, проверки результата, исправления ошибок и объяснения вклада студента.
- id: P4
  name: Ответственность преподавателя
  description: ИИ может помогать в создании материалов и проверке, но итоговое методическое решение, оценка и допуск результата
    принимает преподаватель или уполномоченный проверяющий.
- id: P5
  name: Осторожность в правовой части
  description: Нормативные ссылки, юридические формулировки, правила выдачи документа об обучении и работа с персональными
    данными требуют проверки по официальным источникам и внутренним документам образовательной организации.
learner_project_structure:
- section_id: '1'
  title: Словарь терминологии ИИ применительно к дисциплине
  required: true
  recommended_volume: 10–20 терминов
  purpose: Проверить, что слушатель владеет терминологией ИИ не в общем виде, а в применении к собственной дисциплине.
  required_fields:
  - термин
  - рабочее определение
  - объяснение применительно к дисциплине
  - пример учебного применения
  - связь с заданием или занятием
  quality_requirements:
  - термины не должны быть случайным списком; они должны поддерживать последующие задания и занятие
  - определения должны быть понятны студенту соответствующего уровня подготовки
  - каждый термин должен быть связан с профессиональной задачей дисциплины
  typical_errors:
  - копирование словаря без связи с дисциплиной
  - использование терминов, которые не используются далее в проекте
  - подмена определения рекламным или бытовым описанием
- section_id: '2'
  title: 2–3 задания с обязательным использованием ИИ студентами
  required: true
  recommended_volume: 2–3 задания
  purpose: Проверить способность слушателя проектировать учебные задания, в которых ИИ является обязательным содержательным
    инструментом, а не внешней опцией.
  required_fields:
  - название задания
  - место задания в дисциплине
  - образовательная цель
  - формулировка для студента
  - ожидаемый итоговый продукт студента
  - обязательный процесс работы с ИИ
  - требования к журналу запросов
  - требования к проверке фактов
  - критерии оценивания
  - защитные механизмы от поверхностной генерации
  - условия доработки
  mandatory_student_process:
  - постановка учебной или профессиональной задачи
  - выбор ИИ-инструмента или типа инструмента
  - первичный запрос
  - не менее двух итераций уточнения запроса
  - анализ результата
  - проверка фактов и ключевых утверждений
  - исправление ошибок
  - описание собственного вклада студента
  - итоговая рефлексия о применимости результата
  quality_requirements:
  - задание невозможно качественно выполнить простым копированием ответа ИИ
  - оценивается не только итоговый продукт, но и процесс работы с ИИ
  - критерии оценивания позволяют отличить осмысленное управление ИИ от механической генерации
  typical_errors:
  - формулировка «используйте ИИ при желании» вместо обязательного процесса
  - оценка только итогового текста без журнала запросов
  - отсутствие требований к проверке результата
  - отсутствие связи с результатами дисциплины
- section_id: '3'
  title: План лабораторного или практического занятия
  required: true
  recommended_volume: одно занятие 80–100 минут или иной формат, применимый в дисциплине
  purpose: Показать, как задания и терминология превращаются в реальное занятие со студентами.
  required_fields:
  - тема занятия
  - цель занятия
  - ожидаемые результаты студентов
  - структура занятия по времени
  - действия преподавателя
  - действия студентов
  - роль ИИ на каждом этапе
  - материалы и ресурсы
  - форма контроля
  - рефлексия студентов
  quality_requirements:
  - план занятия должен быть реализуемым в аудитории или онлайн-среде
  - роль ИИ должна быть встроена в учебное действие, а не вынесена в декоративный элемент
  - преподаватель должен показать, как он объясняет студентам требования к журналу запросов и проверке результата
  typical_errors:
  - занятие описано как лекция без действий студентов
  - отсутствует распределение времени
  - не указано, как проверяется результат
  - не предусмотрена работа с ошибками ИИ
- section_id: '4'
  title: Предложение по обновлению рабочей программы модуля
  required: true
  recommended_volume: 1–2 раздела РПМ или проект изменений к ним
  purpose: Связать итоговый проект с официальной учебно-методической документацией дисциплины.
  required_fields:
  - какой раздел РПМ предлагается изменить
  - текущая проблема или ограничение
  - предлагаемая новая формулировка
  - описание задания с обязательным использованием ИИ
  - изменение форм контроля
  - изменение критериев оценивания
  - требуемые условия реализации
  - пометка о необходимости согласования с образовательной организацией
  quality_requirements:
  - предложение должно быть пригодно для методического обсуждения
  - изменения должны быть связаны с результатами обучения дисциплины
  - нормативные формулировки не должны выдумываться без локальных документов
  typical_errors:
  - общая фраза о внедрении ИИ без изменения задания или контроля
  - отсутствие связи с результатами обучения
  - имитация юридического текста без оснований
  - отсутствие указания на необходимость согласования
- section_id: '5'
  title: Критерии оценивания студенческих работ
  required: true
  recommended_volume: не менее 5 критериев, каждый с уровнями достижения
  purpose: Обеспечить проверяемость студенческих работ, выполненных с обязательным использованием ИИ.
  required_fields:
  - критерий
  - уровень высокий
  - уровень достаточный
  - уровень требует доработки
  - основание для незачета
  - доказательство, которое предоставляет студент
  quality_requirements:
  - критерии оценивают процесс управления ИИ и качество итогового продукта
  - критерии включают проверку фактов, авторский вклад, качество итераций и применимость результата
  - рубрика должна быть совместима с ручной и ИИ-помощной проверкой
  typical_errors:
  - критерии оценивают только оформление
  - нет признаков поверхностной генерации
  - не указаны основания для доработки
  - не различаются вклад ИИ и вклад студента
- section_id: '6'
  title: Риски и способы их снижения
  required: true
  recommended_volume: не менее 5 рисков
  purpose: Проверить способность преподавателя заранее учитывать ограничения применения ИИ в дисциплине.
  required_fields:
  - риск
  - ситуация проявления
  - возможные последствия
  - способ снижения
  - кто контролирует
  - что требует проверки по локальным документам
  minimum_risks:
  - персональные данные
  - конфиденциальная информация
  - поверхностная генерация
  - недостоверные факты
  - подмена авторства
  - использование недоступных или нестабильных инструментов
  - неравный доступ студентов к инструментам
  quality_requirements:
  - каждый риск должен иметь конкретную меру снижения
  - юридические выводы не должны формулироваться без проверки
  - меры снижения должны быть применимы преподавателем в рамках занятия или задания
  typical_errors:
  - формальное перечисление рисков без мер
  - отсутствие персональных данных и конфиденциальности в анализе
  - выдуманные правовые ссылки
  - перенос всей ответственности на студента
- section_id: '7'
  title: Рефлексия преподавателя
  required: true
  recommended_volume: 1–2 страницы
  purpose: Проверить осознанность внедрения ИИ в дисциплину и способность преподавателя планировать развитие учебного процесса.
  required_fields:
  - что изменится в дисциплине
  - какие трудности ожидаются
  - какие компетенции студентов будут развиваться
  - какие материалы нужно доработать
  - какие решения нужно согласовать с кафедрой или учебным управлением
  - план дальнейшего развития дисциплины
  quality_requirements:
  - рефлексия должна быть связана с проектом, а не быть общим отношением к ИИ
  - должны быть названы конкретные следующие действия преподавателя
  - должны быть обозначены ограничения и условия внедрения
  typical_errors:
  - общие фразы о необходимости развития
  - отсутствие конкретных действий
  - игнорирование организационных ограничений
  - отсутствие связи с РПМ
learner_template:
  file_name: 08_FINAL_PROJECT_TEMPLATE.md
  fields:
  - ФИО слушателя
  - должность
  - кафедра или подразделение
  - дисциплина
  - уровень обучения студентов
  - форма занятия или контроля
  - дата сдачи
  - версия проекта
  structure:
  - block: 1. Словарь терминологии ИИ для дисциплины
    instruction: 'Заполнить 10–20 терминов по структуре: термин, определение, применение в дисциплине, пример учебной задачи.'
  - block: 2. Задания с обязательным использованием ИИ
    instruction: Описать 2–3 задания. Для каждого задания указать цель, процесс работы студента, журнал запросов, критерии
      оценивания и защиту от поверхностной генерации.
  - block: 3. План занятия
    instruction: Описать одно практическое или лабораторное занятие с распределением времени, действиями преподавателя и студентов.
  - block: 4. Предложение по обновлению РПМ
    instruction: Указать, какой раздел РПМ предлагается изменить, и дать проект формулировки с пометкой о необходимости согласования.
  - block: 5. Критерии оценивания студенческих работ
    instruction: Представить рубрику с уровнями достижения и основаниями для доработки.
  - block: 6. Риски и способы снижения
    instruction: Описать не менее 5 рисков и конкретные меры снижения.
  - block: 7. Рефлексия преподавателя
    instruction: Описать изменения в дисциплине, ожидаемые трудности и дальнейшие действия.
  - block: 8. Приложения
    instruction: Прикрепить примеры запросов, журнал итераций, фрагменты материалов, презентации или дополнительные документы.
assessment_model:
  general_rule: Итоговый проект проверяется по рубрике. ИИ-помощная проверка допускается как предварительный анализ, но итоговое
    решение по официальному ДПО подтверждает преподаватель курса или проверяющий.
  grading_schemes:
  - rubric
  - points
  - pass_fail
  - ai_assisted_with_human_confirmation
  recommended_points: 100
  pass_threshold: 70 баллов из 100 при отсутствии критических нарушений. Проходной порог может быть изменен образовательной
    организацией.
  critical_fail_conditions:
  - отсутствует реальная дисциплина или связь с преподавательской практикой
  - нет заданий с обязательным использованием ИИ
  - нет критериев оценивания студенческих работ
  - нет анализа рисков
  - проект состоит преимущественно из непроверенной генерации без авторского вклада
  - обнаружены персональные или конфиденциальные данные, которые нельзя было раскрывать
  - слушатель не представил защиту проекта или не ответил на обязательные вопросы
  rubric:
  - criterion_id: R1
    criterion: Связь проекта с реальной дисциплиной
    max_points: 10
    excellent: Дисциплина, аудитория, учебная задача и место проекта в образовательном процессе описаны конкретно.
    sufficient: Связь с дисциплиной есть, но отдельные условия реализации не раскрыты.
    revision: Дисциплина обозначена формально, применение проекта неясно.
    fail: Проект не связан с реальной дисциплиной.
  - criterion_id: R2
    criterion: Словарь терминологии ИИ
    max_points: 10
    excellent: 10–20 терминов раскрыты применительно к дисциплине и используются далее в проекте.
    sufficient: Словарь в целом применим, но отдельные термины объяснены недостаточно предметно.
    revision: Словарь носит общий характер и слабо связан с проектом.
    fail: Словарь отсутствует или скопирован без адаптации.
  - criterion_id: R3
    criterion: Качество заданий с обязательным использованием ИИ
    max_points: 20
    excellent: Задания требуют осмысленного управления ИИ, журнала запросов, проверки фактов, исправлений и объяснения вклада
      студента.
    sufficient: Задания требуют ИИ, но отдельные элементы процесса описаны недостаточно подробно.
    revision: ИИ заявлен как опция или декоративный инструмент.
    fail: Задания можно выполнить без ИИ или простой генерацией.
  - criterion_id: R4
    criterion: План практического или лабораторного занятия
    max_points: 10
    excellent: План реализуем, содержит действия преподавателя и студентов, распределение времени, контроль и рефлексию.
    sufficient: План применим, но требует уточнения отдельных этапов.
    revision: План описан общо, без операциональной структуры.
    fail: План занятия отсутствует.
  - criterion_id: R5
    criterion: Предложение по обновлению РПМ
    max_points: 10
    excellent: Предложение содержит конкретный фрагмент изменений, связано с результатами обучения и формами контроля.
    sufficient: Предложение применимо, но требует методической доработки.
    revision: Предложение носит декларативный характер.
    fail: Предложение по РПМ отсутствует.
  - criterion_id: R6
    criterion: Критерии оценивания студенческих работ
    max_points: 15
    excellent: Рубрика оценивает процесс работы с ИИ, проверку фактов, авторский вклад и качество итогового продукта.
    sufficient: Критерии есть, но не полностью различают процесс и итоговый продукт.
    revision: Критерии слишком общие и не защищают от поверхностной генерации.
    fail: Критерии отсутствуют.
  - criterion_id: R7
    criterion: Риски и меры снижения
    max_points: 10
    excellent: Риски описаны конкретно, меры снижения реалистичны, правовые вопросы отмечены как требующие проверки.
    sufficient: Риски указаны, но часть мер требует уточнения.
    revision: Риски перечислены формально.
    fail: Риски отсутствуют или содержат выдуманные правовые утверждения.
  - criterion_id: R8
    criterion: Рефлексия и план дальнейшего развития дисциплины
    max_points: 5
    excellent: Рефлексия содержит конкретные выводы и дальнейшие действия.
    sufficient: Рефлексия есть, но часть выводов общая.
    revision: Рефлексия декларативна.
    fail: Рефлексия отсутствует.
  - criterion_id: R9
    criterion: Видео-защита
    max_points: 10
    excellent: Защита ясно объясняет логику проекта, критерии, риски и отвечает на вопросы.
    sufficient: Защита подтверждает основную логику, но отдельные ответы неполные.
    revision: Защита поверхностна и требует дополнительных пояснений.
    fail: Защита отсутствует или не подтверждает авторское понимание проекта.
video_defense:
  required: true
  duration: 10–15 минут
  format: асинхронная видео-презентация с последующими ответами на 3–5 вопросов преподавателя курса
  submission_requirements:
  - видеофайл или ссылка на закрытый файл в хранилище платформы
  - презентация или план выступления
  - ответы на вопросы преподавателя отдельным текстом, аудио или видео
  - соблюдение требований к персональным и конфиденциальным данным
  speech_structure:
  - part: 1. Дисциплина и учебная задача
    time: 1–2 минуты
  - part: 2. Терминологическая база
    time: 1–2 минуты
  - part: 3. Разбор одного задания с обязательным использованием ИИ
    time: 3–4 минуты
  - part: 4. Критерии оценивания студенческой работы
    time: 2–3 минуты
  - part: 5. Риски и меры снижения
    time: 1–2 минуты
  - part: 6. Предложение по обновлению РПМ и дальнейшие действия
    time: 1–2 минуты
  teacher_questions_bank:
  - Почему выбранное задание невозможно или существенно ограничено без использования ИИ?
  - Какие признаки покажут, что студент не просто скопировал ответ ИИ?
  - Какие утверждения в работе студента требуют обязательной проверки?
  - Как вы объясните студентам требование вести журнал запросов?
  - Что изменится в критериях оценивания после внедрения этого задания?
  - Какие данные нельзя передавать в ИИ-инструмент при выполнении задания?
  - Какой раздел РПМ требует изменения для закрепления такого задания?
  - Какие трудности могут возникнуть у студентов с низкой цифровой подготовкой?
  - Как вы будете действовать, если студент использовал ИИ недобросовестно?
  - Какие элементы проекта можно внедрить уже в ближайшем семестре?
competency_mapping:
- competency: ПК-ИИ-1
  project_evidence: словарь терминологии и объяснение принципов ИИ применительно к дисциплине
- competency: ПК-ИИ-2
  project_evidence: журнал запросов и итераций в заданиях с обязательным использованием ИИ
- competency: ПК-ИИ-3
  project_evidence: процедура проверки фактов и ошибок в студенческих заданиях
- competency: ПК-ИИ-4
  project_evidence: план занятия и учебные материалы, подготовленные с учетом ИИ
- competency: ПК-ИИ-5
  project_evidence: 2–3 задания с обязательным использованием ИИ студентами
- competency: ПК-ИИ-6
  project_evidence: 'при наличии научно-аналитического компонента: структура анализа, проверка источников, корректность аргументации'
- competency: ПК-ИИ-7
  project_evidence: 'при наличии организационного компонента: шаблоны документов, инструкции, регламенты, рабочие коммуникации'
- competency: ПК-ИИ-8
  project_evidence: визуальные, презентационные или мультимодальные материалы в составе занятия или заданий
- competency: ПК-ИИ-9
  project_evidence: карта рисков, чек-лист безопасного применения ИИ, ограничения по данным и авторству
- competency: ПК-ИИ-10
  project_evidence: полный итоговый проект и асинхронная защита
platform_implementation_requirements:
  course_content:
  - entity: CourseTemplate
    requirement: 'В шаблоне курса должен быть создан итоговый элемент модуля 8: «Итоговый проект».'
    priority: must
  - entity: CourseModule
    requirement: Итоговый проект размещается в модуле 8 «Риски, этика, безопасность и итоговый проект».
    priority: must
  - entity: Lesson
    requirement: Перед итоговым проектом должен быть урок-инструкция с описанием требований, шаблона и видео-защиты.
    priority: must
  - entity: CourseResource
    requirement: К уроку прикрепляются шаблон проекта, инструкция, рубрика, пример структуры и чек-лист рисков.
    priority: must
  assessment:
  - entity: AssessmentItem
    field: type
    value: final_project
    requirement: Создать итоговую работу как контрольный элемент типа final_project.
    priority: must
  - entity: GradeScheme
    field: type
    value: rubric / points / pass_fail
    requirement: Схема оценивания должна поддерживать рубрику на 100 баллов и итоговый статус зачтено / не зачтено.
    priority: must
  - entity: GradeScheme
    field: gradingMode
    value: ai_assisted или mixed
    requirement: ИИ-помощная проверка допускается только как предварительная и требует подтверждения преподавателем.
    priority: should
  - entity: AssignmentSubmission
    field: status
    value: draft, submitted, in_review, needs_revision, accepted, rejected
    requirement: Поддержать полный жизненный цикл отправки итогового проекта.
    priority: must
  - entity: SubmissionAttempt
    requirement: Хранить все попытки отправки итогового проекта и приложенные файлы.
    priority: must
  - entity: AssignmentReview
    requirement: Проверяющий должен оставить статус, комментарий, баллы по рубрике и решение о зачете.
    priority: must
  - entity: AiReviewSuggestion
    requirement: Опционально хранить черновую ИИ-оценку с confidence, suggestedScore и suggestedComment.
    priority: could
  - entity: Grade
    requirement: После принятия проекта формировать итоговую оценку по assessment и учитывать ее в финальном статусе Enrollment.
    priority: must
  storage:
  - entity: StorageObject
    requirement: Хранить файлы проекта, презентацию, видео-защиту и приложения как объекты хранилища, а не как бинарные данные
      в БД.
    priority: must
  - entity: CourseResource
    requirement: Шаблоны и инструкции хранятся как ресурсы урока.
    priority: must
  - entity: SubmissionAttempt
    requirement: Каждая попытка может иметь текстовый ответ и один или несколько файловых объектов.
    priority: must
  access_control:
  - role: student/learner
    permissions:
    - view_own_final_project
    - edit_draft_before_submit
    - submit_final_project
    - view_own_review
    - resubmit_if_needs_revision
  - role: teacher/reviewer
    permissions:
    - view_submissions_in_assigned_course_run
    - review_final_project
    - request_revision
    - accept_or_reject
    - confirm_ai_review
  - role: course_author/admin
    permissions:
    - edit_final_project_template
    - edit_rubric
    - publish_assessment_item
  audit_events:
  - final_project.submitted
  - final_project.review_started
  - final_project.revision_requested
  - final_project.accepted
  - final_project.rejected
  - final_project.grade_changed
  - final_project.ai_review_created
  - certificate.generated_after_completion
  api_endpoints:
  - method: POST
    path: /api/v1/course-templates/:id/assessment-items
    purpose: создать итоговый проект как AssessmentItem
  - method: POST
    path: /api/v1/assessment-items/:id/start
    purpose: создать попытку выполнения итогового проекта
  - method: POST
    path: /api/v1/assessment-attempts/:id/submit
    purpose: отправить итоговый проект на проверку
  - method: GET
    path: /api/v1/submissions/:id
    purpose: просмотр отправленного проекта
  - method: POST
    path: /api/v1/submissions/:id/reviews
    purpose: ручная проверка, комментарий, статус и баллы
  - method: POST
    path: /api/v1/submissions/:id/ai-review
    purpose: создать ИИ-предложение проверки, если функция включена
  - method: POST
    path: /api/v1/storage/objects
    purpose: зарегистрировать файл итогового проекта или видео-защиты
  - method: POST
    path: /api/v1/course-runs/:id/certificates/generate
    purpose: создать документы для успешно завершивших курс после подтверждения всех компетенций
workflow:
- state: not_started
  description: слушатель еще не открыл итоговый проект
- state: draft
  description: слушатель начал работу и может сохранять черновик
- state: submitted
  description: слушатель отправил проект и материалы на проверку
- state: in_review
  description: преподаватель или проверяющий начал проверку
- state: needs_revision
  description: проект требует доработки; слушатель получает комментарии и может отправить повторную попытку
- state: accepted
  description: проект принят и засчитывается в итоговый статус курса
- state: rejected
  description: проект не принят; требуется решение о пересдаче или повторном прохождении
- state: completed
  description: проект принят, защита завершена, результаты перенесены в итоговый статус Enrollment
acceptance_criteria_for_development:
- В CourseTemplate создан итоговый контрольный элемент типа final_project.
- Для слушателя доступна инструкция, шаблон проекта, рубрика и форма отправки.
- Слушатель может сохранить черновик, отправить проект, прикрепить файлы и видео-защиту.
- Система хранит все попытки отправки.
- Проверяющий видит проект, файлы, видео-защиту, рубрику и историю попыток.
- Проверяющий может принять, отклонить или вернуть проект на доработку.
- Проверяющий может выставить баллы по рубрике и итоговый статус.
- ИИ-помощная проверка, если включена, не заменяет решение человека.
- После принятия проекта результат учитывается в финальном статусе курса.
- Без принятого итогового проекта курс не считается успешно завершенным.
- Все критические действия фиксируются в AuditLog.
- Файлы проекта и видео-защиты хранятся через StorageObject.
- Юридически значимая выдача сертификата не запускается без согласованного порядка образовательной организации.
open_questions:
- 'Какой точный формат файлов итогового проекта разрешить: PDF, DOCX, MD, ZIP, PPTX, видео?'
- Какой максимальный размер видео-защиты допустим на первом пилоте?
- Нужно ли разрешать ссылки на внешние хранилища или принимать только загрузку в платформу?
- Сколько попыток доработки проекта разрешить по умолчанию?
- 'Кто является основным проверяющим итогового проекта: преподаватель курса, комиссия или назначенный reviewer?'
- 'Какая минимальная проходная граница утверждается официально: 70/100 или только зачтено / не зачтено?'
- Нужно ли формировать отдельный протокол итоговой аттестации?
- Нужна ли выгрузка итогового проекта и рубрики для учебного управления?
- Какие локальные формулировки использовать для РПМ после согласования с образовательной организацией?
definition_of_done:
- Методическая модель итогового проекта утверждена в рамках курса.
- Шаблон для слушателя готов и может быть выдан в платформе.
- Рубрика оценивания готова и совместима с GradeScheme.
- Видео-защита описана как обязательный элемент подтверждения ПК-ИИ-10.
- Требования к платформенной реализации переданы инженерам.
- Открытые юридические и организационные вопросы вынесены отдельно и не подменены выдуманными нормами.
- Этап может быть реализован как AssessmentItem типа final_project в модуле 8 курса.
