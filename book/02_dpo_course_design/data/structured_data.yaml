competencies:
- code: ПК-ИИ-1
  name: Концептуальная грамотность об ИИ
  modules:
  - m1
  - m2
  - m3
  artifact: короткое объяснение принципов ИИ с примером из собственной дисциплины
  test: концептуальный тест 15-20 вопросов
  pass_rule: артефакт принят по критериям и тест выполнен не ниже установленного порога
  typical_errors:
  - мистификация ИИ
  - объяснение без связи с дисциплиной
  - смешение факта и предположения
- code: ПК-ИИ-2
  name: Постановка запросов как профессиональный навык
  modules:
  - m4
  - m5
  - m6
  - m7
  artifact: личная библиотека 10-15 запросов и разбор трех улучшений
  test: практический тест на составление запросов для пяти задач
  pass_rule: запросы содержат цель, контекст, ограничения, формат и критерии результата
  typical_errors:
  - общий запрос без критериев
  - отсутствие итераций
  - ожидание готового результата без проверки
- code: ПК-ИИ-3
  name: Критическая проверка ответов ИИ
  modules:
  - m3
  - m5
  - m6
  artifact: анализ сгенерированного текста с проверкой не менее трех утверждений
  test: сценарный тест на выявление утверждений, требующих проверки
  pass_rule: слушатель выделяет проверяемые утверждения, проверяет их и исправляет ошибки
  typical_errors:
  - доверие уверенной формулировке
  - отсутствие источников проверки
  - игнорирование дат, чисел и названий документов
- code: ПК-ИИ-4
  name: Применение ИИ в подготовке учебных материалов
  modules:
  - m5
  artifact: фрагмент занятия на 90 минут с журналом использования ИИ
  test: тест на выбор допустимых способов применения ИИ в учебной работе
  pass_rule: материал применим в занятии, адаптирован под аудиторию и проверен преподавателем
  typical_errors:
  - копирование машинного текста
  - отсутствие методической цели
  - непроверенные примеры
- code: ПК-ИИ-5
  name: Проектирование заданий с обязательным использованием ИИ студентами
  modules:
  - m5
  artifact: задание для собственной дисциплины с обязательным использованием ИИ
  test: анализ заданий по категориям обязательное/возможное/запрещенное использование ИИ
  pass_rule: задание требует постановки задачи, итераций, проверки фактов и объяснения вклада студента
  typical_errors:
  - задание сводится к простой генерации текста
  - оценивание только итогового текста
  - нет защиты от механического копирования
- code: ПК-ИИ-6
  name: Применение ИИ в научной и аналитической работе
  modules:
  - m6
  artifact: структура научного или аналитического текста с декларацией использования ИИ
  test: сценарный тест на допустимые и недопустимые способы применения ИИ
  pass_rule: показано разграничение авторского вклада, помощи ИИ и ручной проверки источников
  typical_errors:
  - выдача машинной генерации за авторский текст
  - непроверенные источники
  - отсутствие декларации использования ИИ
- code: ПК-ИИ-7
  name: Применение ИИ в документообороте и профессиональной рутине
  modules:
  - m7
  artifact: переработанный рабочий документ и шаблон запроса для регулярной задачи
  test: практический тест на выбор инструмента и формата запроса для офисных задач
  pass_rule: документ улучшен, проверен и не содержит недопустимого раскрытия данных
  typical_errors:
  - передача конфиденциальных данных
  - потеря обязательных реквизитов
  - отсутствие финальной проверки человеком
- code: ПК-ИИ-8
  name: Многомодальный ИИ для учебных и презентационных материалов
  modules:
  - m3
  - m5
  - m7
  artifact: комплект из визуального, аудио- или видеофрагмента и презентационного материала
  test: тест на различение задач генерации, редактирования и оценки пригодности результата
  pass_rule: материалы имеют учебную цель, проверены и сопровождаются пояснением процесса создания
  typical_errors:
  - визуальный материал без учебной задачи
  - нечитабельная схема
  - отсутствие правки после генерации
- code: ПК-ИИ-9
  name: Безопасность, этика и правовые границы применения ИИ
  modules:
  - m8
  artifact: чек-лист допустимости применения ИИ и анализ типовых ситуаций
  test: сценарный тест по ситуациям риска
  pass_rule: слушатель различает допустимые и недопустимые сценарии и указывает способ снижения риска
  typical_errors:
  - формальное предупреждение без применения
  - загрузка персональных данных без оценки допустимости
  - игнорирование локальных правил
- code: ПК-ИИ-10
  name: ИИ-лидерство в собственной дисциплине
  modules:
  - m8
  artifact: итоговый проект интеграции ИИ в дисциплину или РПМ
  test: асинхронная видео-защита и ответы на вопросы преподавателя
  pass_rule: проект применим в дисциплине и содержит задания, критерии, риски и предложение по обновлению РПМ
  typical_errors:
  - общие намерения без дисциплины
  - нет критериев оценивания
  - не раскрыты риски и ограничения
assessment_forms:
- id: current_artifact
  name: текущее практическое задание
  purpose: проверка профессионального действия по модулю
  grade_scheme: зачтено/требует доработки/не зачтено + оценивание по критериям
- id: module_test
  name: тестовая проверка модуля
  purpose: проверка понятий, процедур и распознавания ситуаций
  grade_scheme: баллы с проходным порогом или зачтено/не зачтено
- id: practical_test
  name: практическая проверка навыка
  purpose: проверка умения применить правило к новой задаче
  grade_scheme: оценивание по критериям; ИИ-помощная проверка только как предварительный анализ
- id: final_project
  name: итоговый проект
  purpose: проверка интеграции всех компетенций в дисциплину слушателя
  grade_scheme: оценивание по критериям + подтверждение преподавателем
- id: video_defense
  name: асинхронная видео-защита
  purpose: проверка самостоятельного понимания логики проекта
  grade_scheme: зачтено/не зачтено + комментарий проверяющего
module_controls:
- module: m1
  artifact: карта личных задач и пример улучшения запроса
  test: концептуальный тест по назначению ИИ и роли преподавателя
  competencies:
  - ПК-ИИ-1
- module: m2
  artifact: объяснение принципа простой нейросети
  test: тест по входам, весам, функции активации и ошибкам модели
  competencies:
  - ПК-ИИ-1
- module: m3
  artifact: разметка сгенерированного ответа и проверка утверждений
  test: тест на распознавание галлюцинаций и проверяемых утверждений
  competencies:
  - ПК-ИИ-1
  - ПК-ИИ-3
  - ПК-ИИ-8
- module: m4
  artifact: библиотека профессиональных запросов
  test: практический тест на составление запросов
  competencies:
  - ПК-ИИ-2
- module: m5
  artifact: фрагмент занятия и задание с обязательным использованием ИИ
  test: методический тест по учебным заданиям и критериям
  competencies:
  - ПК-ИИ-4
  - ПК-ИИ-5
- module: m6
  artifact: структура научного или аналитического текста
  test: сценарный тест по академической добросовестности
  competencies:
  - ПК-ИИ-6
- module: m7
  artifact: переработанный рабочий документ и шаблон запроса
  test: практический тест по документам и регулярным задачам
  competencies:
  - ПК-ИИ-7
  - ПК-ИИ-8
- module: m8
  artifact: чек-лист безопасности и итоговый проект
  test: сценарный тест и асинхронная защита
  competencies:
  - ПК-ИИ-9
  - ПК-ИИ-10
rubrics:
  artifact_base:
  - criterion: постановка задачи
    levels:
      '2': задача конкретна и связана с практикой
      '1': задача частично конкретизирована
      '0': задача общая или отсутствует
  - criterion: структура запроса
    levels:
      '2': есть цель, контекст, ограничения, формат и критерии
      '1': часть элементов присутствует
      '0': структура отсутствует
  - criterion: итерации
    levels:
      '2': итерации показаны и обоснованы
      '1': итерации указаны формально
      '0': итераций нет
  - criterion: проверка результата
    levels:
      '2': проверка выполнена и задокументирована
      '1': проверка частичная
      '0': проверки нет
  - criterion: практическая применимость
    levels:
      '2': продукт можно использовать в работе
      '1': продукт требует доработки
      '0': продукт неприменим
  - criterion: ограничения и безопасность
    levels:
      '2': учтены данные, авторство и локальные правила
      '1': учтены частично
      '0': ограничения не рассмотрены
  final_project:
  - criterion: связь с дисциплиной
    max_points: 10
    description: проект основан на реальной дисциплине и конкретной учебной задаче
  - criterion: задания с обязательным использованием ИИ
    max_points: 20
    description: задания требуют управления ИИ, проверки и объяснения вклада студента
  - criterion: методическая целостность
    max_points: 15
    description: цель, действия студента, критерии и ожидаемый результат согласованы
  - criterion: критерии оценивания студенческих работ
    max_points: 15
    description: описаны показатели, уровни качества и основания для доработки
  - criterion: предложение по обновлению РПМ
    max_points: 15
    description: предложение пригодно для методического обсуждения
  - criterion: риски и меры снижения
    max_points: 15
    description: описаны правовые, организационные и учебные риски
  - criterion: рефлексия и план развития
    max_points: 10
    description: показано дальнейшее развитие дисциплины
  video_defense:
  - criterion: ясность представления проекта
    pass_indicator: слушатель кратко и последовательно объясняет структуру проекта
  - criterion: обоснование методических решений
    pass_indicator: слушатель объясняет, почему выбраны именно такие задания и критерии
  - criterion: понимание рисков
    pass_indicator: слушатель называет риски и способы их снижения
  - criterion: самостоятельность позиции
    pass_indicator: ответы показывают владение материалом, а не чтение готового текста
  - criterion: связь с РПМ
    pass_indicator: слушатель показывает, какие элементы могут быть перенесены в рабочую программу модуля
status_model:
  submission_statuses:
  - draft
  - submitted
  - in_review
  - needs_revision
  - accepted
  - rejected
  grade_statuses:
  - pass
  - fail
  - completed
  - not_completed
  - partial
  certificate_statuses:
  - draft
  - issued
  - revoked
  - partial
  transitions:
  - from: draft
    to: submitted
    event: слушатель отправил работу
  - from: submitted
    to: in_review
    event: работа принята на проверку
  - from: in_review
    to: needs_revision
    event: проверяющий назначил доработку
  - from: needs_revision
    to: submitted
    event: слушатель отправил новую попытку
  - from: in_review
    to: accepted
    event: работа принята
  - from: in_review
    to: rejected
    event: работа не принята после исчерпания возможностей доработки
platform_entities:
- russian: контрольный элемент
  technical: AssessmentItem
  purpose: задание, тест, итоговый проект или защита
- russian: схема оценивания
  technical: GradeScheme
  purpose: тип результата, максимальный балл, проходной порог и критерии
- russian: отправка работы
  technical: AssignmentSubmission
  purpose: общая запись работы слушателя по контрольному элементу
- russian: попытка отправки
  technical: SubmissionAttempt
  purpose: конкретная версия загруженной работы или ответа
- russian: проверка работы
  technical: AssignmentReview
  purpose: решение проверяющего, комментарий, статус и дата
- russian: оценка
  technical: Grade
  purpose: итоговый результат по заданию, модулю или курсу
- russian: выданный документ
  technical: IssuedCertificate
  purpose: запись о документе об обучении и освоенных компетенциях
implementation_requirements:
- id: FOS-FR-01
  requirement: 'создать типы контрольных элементов: задание, тест, итоговый проект, рефлексия, защита'
- id: FOS-FR-02
  requirement: 'поддержать схемы оценивания: зачтено/не зачтено, баллы, статус, оценивание по критериям, ИИ-помощная проверка'
- id: FOS-FR-03
  requirement: хранить все попытки отправки работы и историю проверок
- id: FOS-FR-04
  requirement: разрешить преподавателю подтвердить, изменить или отклонить предварительное предложение ИИ-помощной проверки
- id: FOS-FR-05
  requirement: фиксировать освоение каждой компетенции только после принятия артефакта и теста
- id: FOS-FR-06
  requirement: формировать итоговый статус курса и основание для документа об обучении
- id: FOS-FR-07
  requirement: записывать критические действия проверки и изменения оценок в журнал действий
open_questions:
- утвердить официальный проходной порог по тестам и балльным заданиям
- уточнить максимальное количество попыток для каждого типа задания
- определить, кто входит в состав комиссии при спорных результатах
- согласовать юридический статус сертификата или удостоверения
- уточнить, какие данные можно передавать в ИИ-помощную проверку
- утвердить порядок донабора отдельных компетенций без повторного прохождения всего курса
