branch:
  id: branch_05_fos
  title: Ветка 5. Фонд оценочных средств
  course_title: 'ИИ-инструменты в преподавательской, научной и повседневной работе: от понимания принципов до практического
    применения'
  hours: 72
  status: проектный материал для Jupyter Book и последующей инженерной реализации
  language_policy: строгий методический русский язык; англицизмы заменяются русскими понятиями, технические идентификаторы
    сохраняются в скобках
source_documents:
- file: ASSESSMENT_CERTIFICATION.md
  role: исходная модель оценивания и документов об обучении
- file: COURSE_DPO_AI_72H.md
  role: структура курса, часы, модули, компетенции
- file: DATA_MODEL.md
  role: сущности данных для оценивания, попыток, проверок и итогового статуса
- file: MVP_SPEC.md
  role: 'образовательный сценарий MVP: задания, тесты, проверка, прогресс'
- file: API_SPEC.md
  role: программные интерфейсы для тестов, отправок, проверок и сертификатов
- file: ACCESS_ROLES_ADMIN.md
  role: роли, права доступа, аудит критических действий
- file: FACULTY_AI_STRATEGY.md
  role: стратегический контекст интеграции ИИ в образовательную деятельность
- file: LEGAL_PRIVACY.md
  role: правовая зона, согласия, персональные данные
- file: DECISIONS_AND_QUESTIONS.md
  role: принятые решения и открытые вопросы
- file: ARCHITECTURE.md
  role: архитектурная модель платформы
- file: PRODUCT_VISION.md
  role: продуктовый контур образовательной экосистемы
- file: PWA_STRATEGY.md
  role: формат первого клиентского доступа
- file: BRANDING_AND_NAMING.md
  role: названия платформы и публичная идентичность
- file: README.md
  role: общая навигация по проекту
- file: schema.prisma
  role: первичная схема базы данных
