  entity: CourseRun
  required_fields:
  - courseTemplateId
  - organizationId
  - cohortId
  - title
  - startsAt
  - endsAt
  - timezone
  - status
  status_flow:
  - planned
  - active
  - completed
  - archived
  availability_rule_targets:
  - module
  - lesson
  - assessment
progress_model:
  lesson_progress:
  - not_started
  - in_progress
  - completed
  module_progress:
  - not_started
  - in_progress
  - completed
  enrollment_status:
  - invited
  - active
  - completed
  - failed
  - withdrawn
  completion_rule: all_required_lessons_completed AND all_required_assessments_passed
    AND final_project_accepted AND all_competencies_confirmed
submission_lifecycle:
- draft
- submitted
- in_review
- needs_revision
- accepted
- rejected
course_template_lifecycle: *id001
implementation_tasks:
- area: backend
  id: BE-01
  epic: CourseTemplate
  task: Создать/загрузить CourseTemplate курса ДПО 72 часа
  acceptance: Шаблон имеет organizationId, title, estimatedHours=72, visibility=organization,
    status=draft, version.
- area: backend
  id: BE-02
  epic: CourseModule
  task: Создать 8 CourseModule с orderIndex и estimatedHours
  acceptance: Сумма estimatedHours по модулям = 72; completionRule задан для каждого
    модуля.
- area: backend
  id: BE-03
  epic: Lesson
  task: Создать 45 Lesson с lessonType и estimatedMinutes
  acceptance: Каждый урок привязан к модулю, имеет порядок, тип и правило завершения.
- area: backend
  id: BE-04
  epic: CourseResource
  task: Реализовать загрузку и привязку видео, PDF, презентаций, шаблонов запросов
  acceptance: CourseResource связан с Lesson и StorageObject; файл не хранится в БД.
- area: backend
  id: BE-05
  epic: AssessmentItem
  task: Создать контрольные элементы по каждому модулю
  acceptance: Все обязательные артефакты, тесты и итоговый проект созданы и связаны
    с GradeScheme.
- area: backend
  id: BE-06
  epic: QuizQuestion
  task: 'Поддержать вопросы тестов: single_choice, multiple_choice, short_text, matching,
    ordering'
  acceptance: Автотесты могут быть запущены, отправлены и автоматически оценены.
- area: backend
  id: BE-07
  epic: Submission
  task: Реализовать AssignmentSubmission, SubmissionAttempt, AssignmentReview
  acceptance: История попыток сохраняется; статусы draft/submitted/in_review/needs_revision/accepted/rejected
    работают.
- area: backend
  id: BE-08
  epic: Progress
  task: Рассчитывать LessonProgress, ModuleProgress, Enrollment.progressPercent
  acceptance: Слушатель и преподаватель видят корректный прогресс; модуль закрывается
    только после уроков и обязательных оцениваний.
- area: backend
  id: BE-09
  epic: CourseRun
  task: Создать запуск курса для Cohort с AvailabilityRule
  acceptance: Запуск использует CourseTemplate, даты в UTC, timezone=Europe/Moscow,
    преподаватели назначены.
- area: backend
  id: BE-10
  epic: Certificate
  task: Подготовить генерацию IssuedCertificate для завершивших курс
  acceptance: Сертификат создается только при подтверждении всех 10 компетенций и
    итогового проекта; есть verificationCode.
- area: backend
  id: BE-11
  epic: Access
  task: Проверить контекстные права доступа
  acceptance: Слушатель видит только назначенный CourseRun; преподаватель проверяет
    только свои потоки; администратор управляет в своей организации.
- area: backend
  id: BE-12
  epic: Audit
  task: Логировать критические действия курса
  acceptance: Публикация, дедлайны, оценки, сертификаты, назначения и изменения статусов
    попадают в AuditLog.
- area: frontend
  id: FE-01
  epic: MyCourses
  task: Экран «Мои курсы»
  acceptance: Показывает назначенный курс ДПО, прогресс, дедлайн, статус прохождения.
- area: frontend
  id: FE-02
  epic: CourseRunPage
  task: Страница запуска курса
  acceptance: Показывает 8 модулей, часы, статус, обязательные задания, прогресс.
- area: frontend
  id: FE-03
  epic: LessonPage
  task: Страница урока
  acceptance: Видео, конспект, материалы, кнопка завершения, переход к следующему
    уроку.
- area: frontend
  id: FE-04
  epic: Assessment
  task: Экран задания/артефакта
  acceptance: Инструкция, критерии, загрузка файла/текста, история попыток, комментарии
    проверяющего.
- area: frontend
  id: FE-05
  epic: Quiz
  task: Экран теста
  acceptance: Запуск попытки, сохранение ответов, отправка, отображение результата
    и статуса.
- area: frontend
  id: FE-06
  epic: TeacherReview
  task: Кабинет проверки работ
  acceptance: Преподаватель видит отправки, открывает попытку, оставляет комментарий,
    ставит статус/баллы.
- area: frontend
  id: FE-07
  epic: Progress
  task: Визуализация прогресса
  acceptance: Прогресс курса, модулей, уроков и оценочных элементов отображается согласованно.
- area: frontend
  id: FE-08
  epic: FinalProject
  task: Экран итогового проекта и видео-защиты
  acceptance: Слушатель загружает проект и видео/ссылку; преподаватель проверяет по
    рубрике.
- area: frontend
  id: FE-09
  epic: Certificate
  task: Экран документа об обучении
  acceptance: После завершения показывается статус документа; при выдаче доступен
    PDF/код проверки.
