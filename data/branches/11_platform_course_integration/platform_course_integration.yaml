  - registrationNumber
  - issuedAt
  - hours
  - competencies
  - status
  - storageObjectId
  - fileHash
  - signedByUserId
  - signatureMetadata
  - verificationCode
  - verificationUrl
  legalNote: Юридический статус документа, подпись, печать, регистрационный номер
    и порядок учета требуют отдельного согласования с образовательной организацией.
