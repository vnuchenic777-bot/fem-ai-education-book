article: article_02_dpo_methodology
version: "0.4"
status: planned_pilot_evaluation
pilot_period: "2026-07"
purpose: >
  План допилотной фиксации показателей для журнальной редакции статьи о
  методологии проектирования программ ДПО по ИИ-инструментам для преподавателей.
  Файл описывает только будущий контур анализа и не содержит персональных данных.

legal_and_publication_boundary:
  - Показатели пилота должны публиковаться только в агрегированном или обезличенном виде.
  - Публикация не должна раскрывать персональные данные преподавателей и слушателей.
  - Публикация не должна раскрывать ключи доступа, служебные URL, внутренние идентификаторы и закрытые материалы организации.
  - Документ результата обучения рассматривается как методико-технический объект до отдельного юридического и организационного согласования.

planned_metric_groups:
  - id: course_progress
    title: Прохождение курса
    indicators:
      - доля завершённых модулей
      - темп прохождения уроков
      - итоговый статус слушателя
    possible_visualization:
      - график прогресса по модулям
      - распределение итоговых статусов

  - id: platform_activity
    title: Активность в платформе
    indicators:
      - открытия материалов
      - отправки заданий
      - повторные попытки
      - обращения к итоговому проекту
    possible_visualization:
      - временная диаграмма активности
      - тепловая карта сложных учебных блоков

  - id: assessment_results
    title: Оценивание
    indicators:
      - результаты тестов
      - статусы артефактов
      - количество доработок
      - итоговые оценки
    possible_visualization:
      - диаграмма распределения оценок
      - таблица статусов заданий

  - id: artifact_quality
    title: Качество артефактов
    indicators:
      - соответствие рубрикам
      - типичные ошибки
      - полнота критериев оценивания
      - описание рисков применения ИИ
    possible_visualization:
      - матрица типовых достижений и затруднений
      - агрегированный профиль качества работ

  - id: final_projects
    title: Итоговые проекты
    indicators:
      - привязка проекта к реальной дисциплине
      - наличие заданий с обязательным использованием ИИ
      - наличие предложений по обновлению РПМ
      - качество рефлексии преподавателя
    possible_visualization:
      - матрица переноса результатов курса в дисциплины
      - сводка готовности проектов к методическому обсуждению

  - id: teacher_feedback
    title: Обратная связь преподавателей
    indicators:
      - оценка полезности курса
      - оценка сложности заданий
      - оценка понятности материалов
      - оценка удобства платформы
      - открытые комментарии и предложения
    possible_visualization:
      - агрегированные графики ответов
      - тематическая карта открытых комментариев

  - id: learning_document
    title: Документ результата обучения
    indicators:
      - итоговый статус как основание документа
      - корректность реквизитов
      - технические события формирования
      - технические события проверки
    possible_visualization:
      - схема жизненного цикла документа на данных пилота
      - таблица технических статусов без персональных данных

post_pilot_article_tasks:
  - добавить раздел результатов прохождения курса
  - построить графики активности и завершения модулей
  - описать распределение оценок и статусов заданий
  - провести качественный анализ итоговых проектов
  - обобщить обратную связь преподавателей
  - уточнить ограничения методологии по итогам пилота
  - отделить методико-технические выводы от юридического статуса документа об обучении
